services:
  mysql:
    image: mysql:8.4
    container_name: adproject-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aas_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adproject-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      LOGGING_FILE_PATH: /app/logs
      LOGGING_FILE_NAME: /app/logs/application.log
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      ADPROJECT_ALERTS_ENABLED: ${ADPROJECT_ALERTS_ENABLED:-true}
      ADPROJECT_ALERTS_RECIPIENT_EMAIL: ${ADPROJECT_ALERTS_RECIPIENT_EMAIL}
      ADPROJECT_ALERTS_THRESHOLD_CRITICAL_ERRORS: ${ADPROJECT_ALERTS_THRESHOLD_CRITICAL_ERRORS:-10}
    ports:
      - "8080:8080"
    volumes:
      - app-logs:/app/logs

volumes:
  mysql-data:
  app-logs:
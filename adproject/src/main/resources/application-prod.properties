spring.application.admin.enabled=${SPRING_APPLICATION_ADMIN_ENABLED:true}
spring.jmx.enabled=${SPRING_JMX_ENABLED:true}
management.endpoints.jmx.exposure.include=${MANAGEMENT_ENDPOINTS_JMX_EXPOSURE_INCLUDE:health,info}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/aas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT:5000}
spring.mail.properties.mail.smtp.quitwait=${SPRING_MAIL_QUITWAIT:false}

logging.file.path=${LOGGING_FILE_PATH:logs}
logging.file.name=${LOGGING_FILE_NAME:logs/application.log}

spring.thymeleaf.cache=${SPRING_THYMELEAF_CACHE:true}
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:always}
server.error.include-stacktrace=${SERVER_ERROR_INCLUDE_STACKTRACE:never}

spring.devtools.restart.enabled=false

logging.level.org.thymeleaf=${LOGGING_LEVEL_ORG_THYMELEAF:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_ORG_HIBERNATE_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_ORG_HIBERNATE_TYPE_DESCRIPTOR_SQL_BASICBINDER:WARN}

adproject.alerts.enabled=${ADPROJECT_ALERTS_ENABLED:true}
adproject.alerts.recipient-email=${ADPROJECT_ALERTS_RECIPIENT_EMAIL:}
adproject.alerts.threshold.critical-errors=${ADPROJECT_ALERTS_THRESHOLD_CRITICAL_ERRORS:10}

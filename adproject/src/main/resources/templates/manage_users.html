<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <link rel="stylesheet" th:href="@{/css/admin_sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/manageUser.css}">
</head>
<body class="manage-users-page">
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div class="header-container">
            <img th:src="@{/images/logoUTM.png}" alt="UTM Logo"/>
            <h1>UTM AAS</h1>
        </div>
        
        <div class="card">
            <h1>Manage Users</h1>
            <p>Please select a user type or group action to configure.</p>
            <div class="user-selection">
                <a href="/admin/manage-students">Students</a>
                <a href="/admin/manage-lecturers">Lecturers</a>
                <!--<a href="/admin/manage-supervisors">Industrial Supervisors</a>-->
                <a href="/admin/group-assignment" class="btn btn-primary">Manage Groups & Assignments</a>
            </div>
            
            <div class="admin-promotion-section" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">
                <h3>Admin Role Assignation</h3>
                <p>Assign yourself additional roles to access other dashboards.</p>
                <form th:action="@{/admin/assign-role}" method="post">
                    <input type="hidden" name="email" th:value="${adminUsername}" />
                    <input type="hidden" name="targetRole" value="LECTURER" />
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="action-button promote" style="width: auto; padding: 12px 25px;">
                        Add Lecturer Role to Yourself
                    </button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>

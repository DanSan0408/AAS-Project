<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Supervisors</title>
    <link rel="stylesheet" th:href="@{/css/manageUser.css}">
    <link rel="stylesheet" th:href="@{/css/admin_sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/manage_supervisors.css}">
</head>
<body class="manage-users-page">
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div class="header-container">
            <img th:src="@{/images/logoUTM.png}" alt="UTM Logo"/>
            <h1>UTM CAS</h1>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h1>USER EDITING</h1>
            </div>
            
            <div class="user-editing-container">
                <div class="user-editing-sidebar">
                    <a href="/admin/manage-students">Students</a>
                    <a href="/admin/manage-lecturers">Lecturers</a>
                    <a href="/admin/manage-supervisors" class="active">Industrial Supervisors</a>
                    <a href="/admin/group-assignment">Group Assignment</a>
                </div>
                
                <div class="user-editing-main">
                    <h2>Industrial Supervisors List</h2>

                    <div th:if="${errorMessage}" class="alert alert-danger">
                        <p th:text="${errorMessage}">Error Message Placeholder</p>
                    </div>
                    <div th:if="${successMessage}" class="alert alert-success">
                        <p th:text="${successMessage}">Success Message Placeholder</p>
                    </div>
                    <div th:if="${duplicateWarning}" class="alert alert-warning">
                        <p th:text="${duplicateWarning}">Duplicate Warning</p>
                    </div>

                    <div class="add-form-container">
                        <h3 th:text="${industrialSupervisor.id != null ? 'Update Industrial Supervisor' : 'Add New Industrial Supervisor'}">Add New Industrial Supervisor</h3>
                        <form id="supervisorForm" th:action="@{/admin/manage-supervisors}" th:object="${industrialSupervisor}" method="post">
                            <input type="hidden" th:field="*{id}" />
                            <input type="hidden" name="confirmDuplicate" id="confirmDuplicate" value="false" />

                            <label for="username">Username</label>
                            <input type="text" id="username" th:field="*{username}" required>
                            
                            <label for="password">Password</label>
                            <!-- ✅ FIXED: Make password not required for updates -->
                            <input type="password" id="password" th:field="*{password}" 
                                   th:placeholder="${industrialSupervisor.id != null ? 'Leave blank to keep current password' : ''}">

                            <label for="email">Email</label>
                            <input type="email" id="email" th:field="*{email}" required>
                            
                            <button type="submit" id="submitButton" th:text="${industrialSupervisor.id != null ? 'Update Industrial Supervisor' : 'Add Industrial Supervisor'}">Add Industrial Supervisor</button>
                            
                            <!-- ✅ NEW: Add Cancel button for updates -->
                            <a th:if="${industrialSupervisor.id != null}" th:href="@{/admin/manage-supervisors}" 
                               class="btn-cancel" style="display: inline-block; margin-left: 10px; padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px;">
                               Cancel
                            </a>
                        </form>
                    </div>

                    <form th:action="@{/admin/bulk-delete-supervisors}" method="post" id="bulkDeleteForm">
                        <div class="header-actions">
                            <h3>Existing Supervisors</h3>
                            <button type="submit" 
                                    class="action-button delete" 
                                    style="padding: 8px 15px; font-size: 0.9em;"
                                    onclick="return confirm('Are you sure you want to delete the selected supervisors? This cannot be undone.');">
                                Delete Selected
                            </button>
                        </div>

                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 50px; text-align: center;">
                                        <input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)">
                                    </th>
                                    <th>ID</th>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="supervisor : ${supervisors}">
                                    <td style="text-align: center;">
                                        <input type="checkbox" name="ids" th:value="${supervisor.id}" class="user-checkbox">
                                    </td>
                                    <td th:text="${supervisor.id}"></td>
                                    <td th:text="${supervisor.username}"></td>
                                    <td th:text="${supervisor.email}"></td>
                                    <td>
                                        <div class="table-actions">
                                            <a th:href="@{/admin/edit-supervisor/{id}(id=${supervisor.id})}" class="action-button">Update</a>
                                            <a th:href="@{/admin/delete-supervisor/{id}(id=${supervisor.id})}" 
                                            class="action-button delete"
                                            onclick="return confirm('Are you sure you want to delete this supervisor? This action cannot be undone.');">
                                            Delete
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script th:inline="javascript">
        // Select All Script
        function toggleSelectAll(source) {
            checkboxes = document.getElementsByClassName('user-checkbox');
            for(var i=0, n=checkboxes.length;i<n;i++) {
                checkboxes[i].checked = source.checked;
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const isDuplicate = /*[[${isDuplicate}]]*/ false;
            
            if (isDuplicate) {
                const form = document.getElementById('supervisorForm');
                const submitButton = document.getElementById('submitButton');
                const confirmInput = document.getElementById('confirmDuplicate');
                const duplicateWarning = /*[[${duplicateWarning}]]*/ '';
                
                // Change button appearance
                submitButton.textContent = 'Confirm and Save Anyway';
                submitButton.classList.add('btn-confirm', 'glow-effect');
                
                // Handle form submission
                form.addEventListener('submit', function(event) {
                    event.preventDefault();
                    
                    const confirmed = confirm(duplicateWarning + "\n\nDo you want to save this user anyway?");
                    
                    if (confirmed) {
                        confirmInput.value = 'true';
                        form.submit();
                    } else {
                        // ✅ NEW: Reset button if user cancels
                        submitButton.textContent = /*[[${industrialSupervisor.id != null ? 'Update Industrial Supervisor' : 'Add Industrial Supervisor'}]]*/ 'Add Industrial Supervisor';
                        submitButton.classList.remove('btn-confirm', 'glow-effect');
                    }
                });
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assign Assessment</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"> 
</head>
<body>
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <div class="main-content">
        <div class="head">
             <div class="card" style="max-width: 800px; margin: 0 auto;"> 
                
                <div class="card-header">
                    <h1>Assign Assessment: <span th:text="${assessment.title}">Assessment Title</span></h1>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                    <span th:text="${errorMessage}">Error Message</span>
                </div>

                <div class="add-form-container">
                    <form th:action="@{/admin/assessment/assign}" th:object="${assignmentDto}" method="post">
                        
                        <input type="hidden" th:field="*{assessmentId}" />
                        <input type="hidden" th:field="*{deadlineId}" /> 

                        <div class="form-group">
                            <label for="title">Assignment Title (for Deadlines List):</label>
                            <input type="text" id="title" th:field="*{title}" required/>
                            <small style="color: #bdc3c7; display: block; margin-top: 5px;">This title will appear in the main Deadlines list.</small>
                        </div>

                        <div class="form-group">
                            <label for="assessorType">Who will be the **Assessor**?</label>
                            <select th:field="*{assessorType}" id="assessorType" required>
                                <option value="">-- Select Assessor Role --</option>
                                <option th:each="type : ${assessorTypes}" th:value="${type}" th:text="${type}"></option>
                            </select>
                        </div>

                        <hr style="border-color: #34495e;"/>
                        
                        <div class="form-group">
                            <label style="margin-bottom: 10px; display: block;">Assessment Opening Time:</label>
                            <div class="radio-group">
                                <input type="radio" th:field="*{openType}" value="INSTANT" id="openInstant" checked/> 
                                <label for="openInstant">Open **Instantly** (Now)</label>
                            </div>
                            <div class="radio-group" style="margin-top: 5px;">
                                <input type="radio" th:field="*{openType}" value="SCHEDULED" id="openScheduled"/> 
                                <label for="openScheduled">Open on a **Scheduled Date**</label>
                            </div>
                        </div>

                        <div class="form-group" id="scheduledOpenDateGroup">
                            <label for="openDate">Scheduled Open Date (YYYY-MM-DD):</label>
                            <input type="date" th:field="*{openDate}" id="openDate" />
                            <small style="color: #bdc3c7; display: block; margin-top: 5px;">This field is only used if 'Scheduled Date' is selected above.</small>
                        </div>
                        
                        <hr style="border-color: #34495e;"/>

                        <div class="form-group">
                            <label for="endDate">Assessment **Deadline** (Closing Date: YYYY-MM-DD):</label>
                            <input type="date" th:field="*{endDate}" id="endDate" required/>
                            <small style="color: #e74c3c; display: block; margin-top: 5px;">This is the date the assessment will close.</small>
                        </div>

                        <button type="submit" class="save-deadlines-button" style="background-color: #3498db; margin-top: 20px;">✅ Assign and Save Assessment</button>
                        <a th:href="@{/admin/home}" class="action-button" style="display: block; text-align: center; margin-top: 10px;">Cancel and Go Back</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const scheduledGroup = document.getElementById('scheduledOpenDateGroup');
            const openScheduled = document.getElementById('openScheduled');
            const openInstant = document.getElementById('openInstant');

            function toggleDateInput() {
                scheduledGroup.style.display = openScheduled.checked ? 'block' : 'none';
                
                const openDateInput = document.getElementById('openDate');
                if (openDateInput && !openScheduled.checked) {
                    openDateInput.value = '';
                }
            }

            // Initial state based on DTO's default value (INSTANT)
            toggleDateInput(); 

            // Add event listeners
            openScheduled.addEventListener('change', toggleDateInput);
            openInstant.addEventListener('change', toggleDateInput);
        });
    </script>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Lecturers</title>
    <link rel="stylesheet" th:href="@{/css/manageUser.css}">
    <style>
        .alert-warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        
        .btn-confirm {
            background-color: #ffc107 !important;
            color: #212529 !important;
            border-color: #ffc107 !important;
            font-weight: bold;
        }
        
        .glow-effect {
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.7);
            animation: pulse 1.5s infinite alternate;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(255, 193, 7, 0.5); }
            100% { box-shadow: 0 0 20px rgba(255, 193, 7, 1); }
        }
    </style>
</head>
<body>
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div class="header-container">
            <img th:src="@{/images/utmlogo.png}" alt="UTM Logo"/>
            <h1>UTM CAS</h1>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h1>USER EDITING</h1>
            </div>
            
            <div class="user-editing-container">
                <div class="user-editing-sidebar">
                    <a href="/admin/manage-students">Students</a>
                    <a href="/admin/manage-lecturers" class="active">Lecturers</a>
                    <a href="/admin/manage-supervisors">Industrial Supervisors</a>
                    <a href="/admin/group-assignment">Group Assignment</a>
                </div>
                
                <div class="user-editing-main">
                    <h2>Lecturers List</h2>

                    <div th:if="${errorMessage}" class="alert alert-danger">
                        <p th:text="${errorMessage}">Error Message Placeholder</p>
                    </div>
                    <div th:if="${successMessage}" class="alert alert-success">
                        <p th:text="${successMessage}">Success Message Placeholder</p>
                    </div>
                    <div th:if="${duplicateWarning}" class="alert alert-warning">
                        <p th:text="${duplicateWarning}">Duplicate Warning</p>
                    </div>

                    <div class="add-form-container">
                        <h3 th:text="${lecturer.id != null ? 'Update Lecturer' : 'Add New Lecturer'}">Add New Lecturer</h3>
                        <form id="lecturerForm" th:action="@{/admin/manage-lecturers}" th:object="${lecturer}" method="post">
                            <input type="hidden" th:field="*{id}" />
                            <input type="hidden" name="confirmDuplicate" id="confirmDuplicate" value="false" />

                            <label for="username">Username</label>
                            <input type="text" id="username" th:field="*{username}" required>
                            
                            <label for="password">Password</label>
                            <input type="password" id="password" th:field="*{password}">

                            <label for="email">Email</label>
                            <input type="email" id="email" th:field="*{email}" required>
                            
                            <button type="submit" id="submitButton" th:text="${lecturer.id != null ? 'Update Lecturer' : 'Add Lecturer'}">Add Lecturer</button>
                        </form>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="lecturer : ${lecturers}">
                                <td th:text="${lecturer.id}"></td>
                                <td th:text="${lecturer.username}"></td>
                                <td th:text="${lecturer.email}"></td>
                                <td>
                                    <div class="table-actions">
                                        <a th:href="@{/admin/edit-lecturer/{id}(id=${lecturer.id})}" class="action-button">Update</a>
                                        <a th:href="@{/admin/delete-lecturer/{id}(id=${lecturer.id})}" class="action-button delete">Delete</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const isDuplicate = /*[[${isDuplicate}]]*/ false;
            
            if (isDuplicate) {
                const form = document.getElementById('lecturerForm');
                const submitButton = document.getElementById('submitButton');
                const confirmInput = document.getElementById('confirmDuplicate');
                const duplicateWarning = /*[[${duplicateWarning}]]*/ '';
                
                // Change button appearance
                submitButton.textContent = 'Confirm and Save Anyway';
                submitButton.classList.add('btn-confirm', 'glow-effect');
                
                // Handle form submission
                form.addEventListener('submit', function(event) {
                    event.preventDefault();
                    
                    const confirmed = confirm(duplicateWarning + "\n\nDo you want to save this user anyway?");
                    
                    if (confirmed) {
                        confirmInput.value = 'true';
                        form.submit();
                    }
                });
            }
        });
    </script>
</body>
</html>

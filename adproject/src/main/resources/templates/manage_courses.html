<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Courses</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/admin_home.css}">
</head>
<body class="superadmin-page">
    <div th:replace="~{fragments/superadmin_sidebar :: superadmin_sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <h2>Manage Courses</h2>
            <div class="user-info">
                Welcome, <span th:text="${superAdminUsername}">Super Admin</span>!
            </div>
        </div>

        <div class="container mt-4">
            <div th:if="${successMessage}" class="alert alert-success" role="alert">
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                <span th:text="${errorMessage}"></span>
            </div>

            <h3>Add New Course</h3>
            <form th:action="@{/superadmin/courses/add}" th:object="${newCourse}" method="post" class="mb-4">
                <div class="form-group">
                    <label for="courseName">Course Name:</label>
                    <input type="text" id="courseName" th:field="*{courseName}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="courseCode">Course Code:</label>
                    <input type="text" id="courseCode" th:field="*{courseCode}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" th:field="*{description}" class="form-control"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Add Course</button>
            </form>

            <h3>Existing Courses</h3>
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Course Name</th>
                            <th>Course Code</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="course : ${courses}">
                            <td th:text="${course.id}"></td>
                            <td th:text="${course.courseName}"></td>
                            <td th:text="${course.courseCode}"></td>
                            <td th:text="${course.description}"></td>
                            <td>
                                <a th:href="@{/superadmin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-info">Edit</a>
                                <form th:action="@{/superadmin/courses/delete/{id}(id=${course.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this course? This action cannot be undone.');">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>

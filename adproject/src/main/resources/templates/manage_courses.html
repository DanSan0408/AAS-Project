<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Courses</title>
    <link rel="stylesheet" th:href="@{/css/superadmin_home.css}">
    <link rel="stylesheet" th:href="@{/css/manage_courses.css}">
</head>
<body class="superadmin-page">
    <div th:replace="~{fragments/superadmin_sidebar :: superadmin_sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <h2>Manage Courses</h2>
            <div class="user-info">
                Welcome, <span th:text="${superAdminUsername}">Super Admin</span>!
            </div>
        </div>

        <div class="container manage-courses-container">
            <div th:if="${successMessage}" class="alert alert-success" role="alert">
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="card course-card">
                <div class="card-body">
                    <h3>Add New Course</h3>
                    <form th:action="@{/superadmin/courses/add}" th:object="${newCourse}" method="post" class="course-form">
                        <div class="form-group">
                            <label for="courseName">Course Name</label>
                            <input type="text" id="courseName" th:field="*{courseName}" required>
                        </div>
                        <div class="form-group">
                            <label for="courseCode">Course Code</label>
                            <input type="text" id="courseCode" th:field="*{courseCode}" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" th:field="*{description}" rows="4"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Course</button>
                    </form>
                </div>
            </div>

            <div class="card course-card">
                <div class="card-body">
                    <h3>Existing Courses</h3>
                    <div class="table-scroll">
                        <table class="course-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Course Name</th>
                                    <th>Course Code</th>
                                    <th>Description</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="course : ${courses}">
                                    <td th:text="${course.id}"></td>
                                    <td th:text="${course.courseName}"></td>
                                    <td th:text="${course.courseCode}"></td>
                                    <td th:text="${course.description}"></td>
                                    <td>
                                        <div class="table-actions">
                                            <a th:href="@{/superadmin/courses/edit/{id}(id=${course.id})}" class="btn btn-info">Edit</a>
                                            <form th:action="@{/superadmin/courses/delete/{id}(id=${course.id})}" method="post"
                                                  data-action="confirm-submit"
                                                  data-confirm-message="Are you sure you want to delete this course? This action cannot be undone.">
                                                <button type="submit" class="btn btn-danger">Delete</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${courses == null || courses.isEmpty()}">
                                    <td colspan="5" class="empty-state">No courses available.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/event-delegation.js}" th:attr="nonce=${cspNonce}"></script>

</body>
</html>

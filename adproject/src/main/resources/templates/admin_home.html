<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* CSS for making admin boxes and font bigger */
        .rubric-assessment {
            /* Increase box size and spacing */
            padding: 25px; 
            margin-bottom: 30px; 
            border: 2px solid #3498db; /* Added border for better separation */
            border-radius: 10px;
        }
        
        .assessment-header h3 {
            /* Increase assessment title font size */
            font-size: 1.8em; 
            margin-bottom: 10px;
        }

        .total-marks p, .total-marks div p {
            /* Increase font size for total marks and CLO marks */
            font-size: 1.1em;
            margin: 5px 0;
        }

        .rubric-list {
            /* Allow list items to take more space */
            gap: 20px;
        }

        /* General font increase for list items */
        .rubric-table th, .rubric-table td {
            font-size: 1.05em;
        }
        
        /* New styles to format deadline content */
        .deadline-item {
            background-color: #2c3e50;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .deadline-display {
            display: grid;
            grid-template-columns: 1fr 1fr auto auto; /* Title, Date, Edit, Delete */
            align-items: center;
            gap: 10px;
            padding: 5px 0;
        }
        
        .deadline-display p {
            margin: 0;
        }
        
        .add-new-deadline form {
            display: grid;
            grid-template-columns: auto 1fr auto 1fr auto; /* Labels, Inputs, Button */
            align-items: center;
            gap: 10px;
        }
        
        .add-new-deadline .deadline-item {
            background-color: transparent; /* Remove background for form area */
            padding: 0;
            margin-bottom: 0;
            grid-column: 1 / -1; /* Make the inner item span the full form width */
            display: contents; /* Allows children to be part of the parent grid */
        }
        
        .add-new-deadline input {
            /* Make inputs fill the available grid column space */
            width: auto;
            min-width: 100px;
        }
        
        /* Adjust button width in the form */
        .save-deadlines-button {
            grid-column: 5 / 6;
            margin-top: 0 !important;
        }

        /* Style for delete buttons inside forms */
        .rubric-action-btn.delete-btn {
            border: none;
            cursor: pointer;
            /* Ensure the button inherits the original delete link styling */
            /* Add any necessary styles here if they are not in style.css */
        }
    </style>
</head>
<body>
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <div class="header-container">
                <img th:src="@{/images/utmlogo.png}" alt="UTM Logo"/>
                <h1>UTM CAS</h1>
            </div>
        </div>
        <div class="content-container">
            <div class="rubric-section">
                <h2>RUBRIC</h2>
                <div class="rubric-list">
                    <div th:each="assessment : ${assessments}" class="rubric-assessment">
                        <div class="assessment-header">
                            <h3 th:text="${assessment.title}">Assessment Name</h3>
                        </div>
                        
                        <div class="total-marks">
                            <p style="color: #2ecc71;">
                                <strong>Total Assessment Marks: </strong>
                                <span th:text="${#numbers.formatDecimal(assessment.totalMarks, 1, 2)}">0.00</span>
                            </p>
                            <div th:each="clo : ${assessment.cloMarks}">
                                <p th:text="${'Total CLO ' + clo.key + ' Marks: ' + #numbers.formatDecimal(clo.value, 1, 2)}" style="font-style: italic; color: #7f8c8d;"></p>
                            </div>
                        </div>
                        <div th:if="${not #lists.isEmpty(assessment.rubrics)}">
                            <h4 style="margin-top: 15px; margin-bottom: 5px; color: #3498db;">Likert Rubrics</h4>
                            <table class="rubric-table">
                                <thead>
                                    <tr>
                                        <th>Title</th>
                                        <th>Marks</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="rubric : ${assessment.rubrics}">
                                        <td th:text="${rubric.name}">Rubric Name</td>
                                        <td th:text="${rubric.marks}">Marks</td>
                                        <td>
                                            <a th:href="@{/rubrics/edit/{id}(id=${rubric.id})}" class="rubric-action-btn edit-btn">Edit</a>
                                            <form th:action="@{/rubrics/delete/{id}(id=${rubric.id})}" method="post" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this rubric?');">
                                                <button type="submit" class="rubric-action-btn delete-btn">Delete</button>
                                            </form>
                                            </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div th:if="${not #lists.isEmpty(assessment.criteria)}" style="margin-top: 20px;">
                            <h4 style="margin-bottom: 5px; color: #f39c12;">Criteria Rubrics</h4>
                            <table class="rubric-table">
                                <thead>
                                    <tr>
                                        <th>Title</th>
                                        <th>Marks</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="criteria : ${assessment.criteria}">
                                        <td th:text="${criteria.name}">Criteria Name</td>
                                        <td th:text="${criteria.marks}">Marks</td>
                                        <td>
                                            <a th:href="@{/criteria/edit/{id}(id=${criteria.id})}" class="rubric-action-btn edit-btn">Edit</a>
                                            <form th:action="@{/criteria/delete/{id}(id=${criteria.id})}" method="post" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this criteria rubric?');">
                                                <button type="submit" class="rubric-action-btn delete-btn">Delete</button>
                                            </form>
                                            </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <a th:href="@{/rubrics/add/{id}(id=${assessment.id})}" class="add-rubric-button" style="margin-top: 20px; display: inline-block;">Add New Rubric (Likert)</a>
                        <a th:href="@{/criteria/add/{id}(id=${assessment.id})}" class="add-rubric-button" style="background-color: #f39c12; margin-left: 10px; display: inline-block;">Add New Rubric (Criteria)</a>
                    </div>
                </div>
            </div>

            <div class="deadline-section">
                <h2>DEADLINES</h2>
                <div class="deadline-list">
                    <div th:each="deadline : ${deadlines}" class="deadline-item">
                        <div class="deadline-display">
                            <p><strong>Title:</strong> <span th:text="${deadline.title}"></span></p>
                            <p><strong>Date:</strong> <span th:text="${#dates.format(deadline.date, 'yyyy-MM-dd')}"></span></p>
                            <a th:href="@{/deadlines/edit/{id}(id=${deadline.id})}" class="rubric-action-btn edit-btn">Edit</a>
                            <form th:action="@{/deadlines/delete/{id}(id=${deadline.id})}" method="post" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this deadline?');">
                                <button type="submit" class="rubric-action-btn delete-btn">Delete</button>
                            </form>
                            </div>
                    </div>
                </div>
                
                <div class="add-new-deadline">
                    <h3 style="margin-top: 20px;">Add New Deadline</h3>
                    <form th:action="@{/deadlines/save}" method="post">
                        <div class="deadline-item">
                            <label for="new-title">Title:</label>
                            <input type="text" id="new-title" name="title" required/>
                            <label for="new-date">Date:</label>
                            <input type="date" id="new-date" name="date" required/>
                            <button type="submit" class="save-deadlines-button add-rubric-button">Add Deadline</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

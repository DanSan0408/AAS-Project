<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/css/login.css">
    <style>
        .logo {
            max-width: 120px;
            height: auto;
            margin: 0 auto 20px;
        }
        .success-message {
            background-color: #2ecc71; 
            color: #2c3e50; 
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Logo Image -->
        <img th:src="@{/images/utmlogo.png}" alt="UTM Logo" class="logo" />

        <h3 class="card-title text-center mb-4">Forgot Password</h3>
        
        <!-- Error Alert (using the .alert class for consistency) -->
        <div th:if="${error}" class="alert" role="alert">
            <p th:text="${error}"></p>
        </div>
        
        <!-- Success Message -->
        <div th:if="${message}" class="success-message" role="alert">
            <p th:text="${message}"></p>
        </div>

        <p class="text-sm mb-4">Enter your email address to receive a password reset link.</p>
        
        <form th:action="@{/forgot_password}" method="post">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            
            <button type="submit" class="auth-btn btn-info-custom">Request Reset Link</button>
        </form>
        
        <p class="mt-4">
            <a th:href="@{/login}" class="forgot-password-link">Back to Login</a>
        </p>
    </div>
</body>
</html>

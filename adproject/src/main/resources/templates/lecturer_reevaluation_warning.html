<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Re-evaluation Warning</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/lecturer_warning.css}">
</head>
<body>
    <div th:insert="~{fragments/lecturer_sidebar :: sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <div class="header-container">
                <img th:src="@{/images/utmlogo.png}" alt="UTM Logo"/>
                <h1>UTM CAS</h1>
            </div>
        </div>

        <div class="content-flex-container">
            <div class="warning-container">
                <div class="warning-icon">⚠️</div>
                
                <h2 class="warning-title">Re-evaluation Warning</h2>
                
                <div class="warning-message">
                    <p>You have already evaluated this target for <strong th:text="${assessment.title}">this assessment</strong>.</p>
                    
                    <div class="rubric-type-badge" 
                         th:classappend="${rubricType == 'Group Assessment' ? 'badge-group' : 'badge-individual'}">
                        <span th:text="${rubricType}">Rubric Type</span>
                    </div>
                    
                    <div class="target-info">
                        <p th:if="${selectedGroup != null}">
                            Target: Group "<span th:text="${selectedGroup.groupName}">Group Name</span>"
                        </p>
                        <p th:if="${selectedStudent != null}">
                            Target: Student "<span th:text="${selectedStudent.username}">Student Name</span>"
                        </p>
                    </div>
                    
                    <p class="warning-emphasis"><strong>If you proceed, your previous evaluation will be replaced.</strong></p>
                    <p>Are you sure you want to re-evaluate?</p>
                </div>

                <div class="button-group">
                    <form th:action="@{/lecturer/assessments/{id}/evaluate(id=${assessment.id})}" method="get">
                        <input type="hidden" name="rubricType" th:value="${rubricType}"/>
                        <input type="hidden" name="groupId" th:if="${selectedGroup != null}" th:value="${selectedGroup.id}"/>
                        <input type="hidden" name="studentId" th:if="${selectedStudent != null}" th:value="${selectedStudent.id}"/>
                        <input type="hidden" name="confirmReevaluation" value="true"/>
                        <button type="submit" class="btn-proceed">Yes, Proceed with Re-evaluation</button>
                    </form>
                    
                    <a th:href="@{/lecturer/assessments/{id}/select-target(id=${assessment.id}, rubricType=${rubricType})}" 
                       class="btn-back">
                        No, Go Back
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Group - [[${assessment.title}]]</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/lecturer_select.css}">
</head>
<body>

    <div th:insert="~{fragments/lecturer_sidebar :: sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <div class="header-container">
                <img th:src="@{/images/utmlogo.png}" alt="UTM Logo"/>
                <h1>UTM CAS</h1>
            </div>
        </div>

        <div class="content-flex-container">
            
            <div class="selection-container">
                <div class="dashboard-header">
                    <h2 th:text="${assessment.title}">Assessment Title</h2>
                    <p class="subtitle">Select a group below to begin or continue your evaluation.</p>
                </div>

                <div class="alert-container">
                    <div th:if="${errorMessage}" class="alert alert-error">
                        <span class="icon">✖</span> <span th:text="${errorMessage}">Error</span>
                    </div>
                    <div th:if="${successMessage}" class="alert alert-success">
                        <span class="icon">✓</span> <span th:text="${successMessage}">Success</span>
                    </div>
                </div>

                <div class="groups-grid">
                    <div th:each="group : ${assignedGroups}" class="group-card">
                        
                        <div class="card-top">
                            <h3 th:text="${group.groupName}">Group Name</h3>
                            
                            <div class="status-indicator">
                                <span th:if="${groupEvaluationStatus.get(group.id) == 'completed'}" 
                                      class="badge badge-completed">Completed</span>
                                
                                <span th:if="${groupEvaluationStatus.get(group.id) == 'in_progress'}" 
                                      class="badge badge-progress">In Progress</span>
                                
                                <span th:if="${groupEvaluationStatus.get(group.id) == 'not_started'}" 
                                      class="badge badge-pending">Not Started</span>
                            </div>
                        </div>

                        <div class="card-body">
                            <div class="members-section" th:if="${group.students != null and !group.students.isEmpty()}">
                                <label>Team Members</label>
                                <ul class="member-list">
                                    <li th:each="student : ${group.students}">
                                        <span class="avatar-circle" th:text="${#strings.substring(student.username,0,1)}">U</span>
                                        <span class="member-name" th:text="${student.username}">Student Name</span>
                                    </li>
                                </ul>
                            </div>
                            <div th:if="${group.students == null or group.students.isEmpty()}" class="no-members">
                                <p>No members assigned.</p>
                            </div>
                        </div>

                        <div class="card-footer">
                            <a th:href="@{/lecturer/assessments/{id}/evaluate(id=${assessment.id}, groupId=${group.id})}" 
                               class="btn-action">
                                <span th:if="${groupEvaluationStatus.get(group.id) == 'completed'}">Review Evaluation</span>
                                <span th:if="${groupEvaluationStatus.get(group.id) == 'in_progress'}">Continue</span>
                                <span th:if="${groupEvaluationStatus.get(group.id) == 'not_started'}">Start Evaluation</span>
                            </a>
                        </div>

                    </div> </div> </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UTM CAS</title>
    <link rel="stylesheet" href="/css/critical.css"> 
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/loading.css">
</head>
<body>

    <div id="loading-screen" class="loading-screen">
        <div class="loading-container">
            <img src="/images/utmbulat.png" alt="UTM CAS Logo" class="loading-logo"/>
        </div>
    </div>

    <div class="auth-container">
        <!-- Logo Image -->
        <img th:src="@{/images/logoUTM.png}" alt="UTM Logo" class="logo" />
        
        <h3 class="card-title text-center mb-4">Login</h3>

        <div th:if="${message}" class="success-message" role="alert">
            <p th:text="${message}"></p>
        </div>

        <div th:if="${param.error}" class="alert" role="alert">
            Invalid username or password.
        </div>
        
        <form th:action="@{/login}" method="post">
            <input type="hidden" name="userRole" th:value="${param.userRole}"/>
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label for="remember-me" class="inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="remember-me" name="remember-me"> Remember Me
                </label>
            </div>
            
            <a th:href="@{/forgot_password}" class="forgot-password-link">Forgot Password?</a>
            
            <button type="submit" class="auth-btn btn-primary-custom">Login</button>
        </form>
    </div>

    <script src="/js/loading.js"></script>
</body>
</html>

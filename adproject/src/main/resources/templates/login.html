<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UTM AAS</title>
    <link rel="stylesheet" href="/css/responsive-patterns.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="auth-container">
        <img th:src="@{/images/logoUTM.png}" alt="UTM Logo" class="logo" />
        <h3>Login</h3>

        <div th:if="${param.error}" class="alert">
            <p>Invalid email or password. Please try again.</p>
        </div>

        <div th:if="${param.logout}" class="alert" style="background-color: var(--secondary-gold); color: var(--text-charcoal); border-left-color: #E69610;">
            <p>You have been logged out successfully.</p>
        </div>

        <div th:if="${message}" class="success-message">
            <p th:text="${message}"></p>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Email Address</label>
                <input 
                    type="email" 
                    id="username" 
                    name="username" 
                    class="form-control"
                    placeholder="your.email@example.com" 
                    required 
                    autocomplete="email"
                />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-control"
                    placeholder="Enter your password" 
                    required 
                    autocomplete="current-password"
                />
            </div>

            <div class="form-group">
                <label class="inline-flex">
                    <input type="checkbox" name="remember-me" id="remember-me">
                    <span>Remember me</span>
                </label>
            </div>

            <button type="submit" class="auth-btn btn-primary-custom">Login</button>
        </form>

        <a th:href="@{/forgot_password}" class="forgot-password-link">Forgot Password?</a>
    </div>
</body>
</html>

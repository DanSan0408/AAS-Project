<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Manage Rubric Blueprints</title>
    <link rel="stylesheet" th:href="@{/css/critical.css}">
    <link rel="stylesheet" th:href="@{/css/responsive-patterns.css}">
    <link rel="stylesheet" th:href="@{/css/admin_sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/rubric.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .actions-cell { text-align: center; }
        .action-buttons-flex { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        
        @media (max-width: 768px) {
            .manage-blueprint-header {
                flex-direction: column;
                align-items: flex-start !important;
            }
            /* Fix for overlapping mobile table labels and values */
            .table-responsive td {
                display: flex !important;
                justify-content: space-between !important;
                align-items: flex-start !important;
                text-align: right !important;
                padding: 12px 15px !important;
                gap: 15px;
                word-break: break-word;
            }
            .table-responsive td::before {
                content: attr(data-label);
                font-weight: 600;
                text-align: left;
                flex-shrink: 0;
                position: static !important;
                transform: none !important;
                width: auto !important;
            }
        }
        @media (max-width: 480px) {
            .actions-cell { text-align: right !important; }
            .action-buttons-flex { justify-content: flex-end !important; }
        }
    </style>
</head>
<body class="rubric-page">
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div class="header-container">
            <img th:src="@{/images/logoUTM.png}" alt="UTM Logo"/>
            <h1>UTM AAS</h1>
        </div>
        
        <div class="message-container">
            <div th:if="${successMessage}" class="alert alert-success">
                <i class="fas fa-check-circle"></i> <span th:text="${successMessage}">Success!</span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}">Error!</span>
            </div>
        </div>

        <div class="page-header manage-blueprint-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
            <div>
                <h1 style="color: var(--color-primary); font-size: clamp(1.2rem, 4vw, 1.8rem); margin: 0;"><i class="fas fa-layer-group"></i> Manage Blueprints</h1>
                <p class="text-muted" style="margin-top: 5px; margin-bottom: 0;">Create and manage reusable rubric templates.</p>
            </div>
            <div class="action-bar" style="display: flex; flex-wrap: wrap; gap: 10px; margin: 0;">
                    <a th:href="@{/rubrics/templates/add}" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Create Blueprint
                    </a>
                    <a th:href="@{/rubrics/manage}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Back to Assessments
                    </a>
                </div>
            </div>

        <div class="card list-card">
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 10%;">ID</th>
                            <th style="width: 30%;">Template Name</th>
                            <th style="width: 40%;">Description</th>
                            <th style="width: 20%;" class="actions-cell">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(templates)}">
                            <td colspan="4" style="text-align: center; padding: 20px; font-style: italic; color: #7f8c8d;">No blueprint templates created yet.</td>
                        </tr>
                        <tr th:each="template : ${templates}">
                            <td data-label="ID" th:text="${template.id}">1</td>
                            <td data-label="Name" th:text="${template.name}" style="font-weight: 600;">Standard Blueprint</td>
                            <td data-label="Description" th:text="${template.description}">A description...</td>
                            <td data-label="Actions" class="actions-cell">
                            <div class="action-buttons action-buttons-flex">
                                    <a th:href="@{/rubrics/templates/edit/{id}(id=${template.id})}" class="btn btn-sm btn-edit" title="Edit Blueprint">
                                        <i class="fas fa-edit"></i> Edit
                                    </a>
                                    <form th:action="@{/rubrics/templates/delete/{id}(id=${template.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this blueprint?');" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-delete" title="Delete Blueprint">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script th:src="@{/js/loading.js}"></script>
</body>
</html>

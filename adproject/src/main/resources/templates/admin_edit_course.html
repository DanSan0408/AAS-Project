<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin_sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin_home.css}">
    <link rel="stylesheet" th:href="@{/css/admin_manage_courses.css}">
</head>
<body class="admin-page">
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <div class="header-container">
                <img th:src="@{/images/utmlogo.png}" alt="UTM Logo"/>
                <h1>UTM AAS</h1>
            </div>
        </div>

        <div class="container manage-courses-container">
            <div th:if="${successMessage}" class="alert alert-success" role="alert">
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="card manage-course-card">
                <div class="card-body">
                    <h4 class="card-title">Edit Course</h4>
                    <form th:action="@{/admin/courses/update}" th:object="${course}" method="post">
                        <input type="hidden" th:field="*{id}" />
                        <div class="form-group">
                            <label for="courseName">Course Name</label>
                            <input type="text" id="courseName" th:field="*{courseName}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="courseCode">Course Code</label>
                            <input type="text" id="courseCode" th:field="*{courseCode}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" th:field="*{description}" class="form-control"></textarea>
                        </div>
                        <div class="edit-course-actions">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Course</button>
                            <a th:href="@{/admin/manage-courses}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/course-validation.js}" th:attr="nonce=${cspNonce}"></script>
</body>
</html>

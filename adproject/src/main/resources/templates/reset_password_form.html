<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - UTM CAS</title>
    <link rel="stylesheet" href="/css/reset_password.css">
</head>
<body>

    <div id="loading-screen" class="loading-screen">
        <div class="loading-container">
            <img src="/images/utmbulat.png" alt="UTM CAS Logo" class="loading-logo"/>
        </div>
    </div>

    <div class="auth-container">
        <!-- Logo Image -->
        <img th:src="@{/images/logoUTM.png}" alt="UTM Logo" class="logo" />

        <h3 class="card-title text-center mb-4">Reset Password</h3>
        
        <div th:if="${error}" class="alert" role="alert">
            <p th:text="${error}"></p>
        </div>
        
        <p class="text-sm">Enter and confirm your new password.</p>
        
        <form th:action="@{/reset_password}" method="post">
            <!-- Hidden token field is CRITICAL for form submission -->
            <input type="hidden" name="token" th:value="${token}" required> 
            
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>
            
            <button type="submit" class="auth-btn btn-warning-custom">Update Password</button>
        </form>
        
        <p class="mt-4">
            <a th:href="@{/login}" class="forgot-password-link">Back to Login</a>
        </p>
    </div>
</body>
</html>

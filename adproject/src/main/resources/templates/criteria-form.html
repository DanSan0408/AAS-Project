<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Criteria Rubric Form</title>
    <link rel="stylesheet" th:href="@{/css/rubric.css}">
    <style>
        .button-container {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        /* Styles for the custom message box */
        #submission-message {
            display: none; /* Hidden by default */
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-weight: bold;
            text-align: center;
            z-index: 1000;
            background-color: #f8d7da; /* Light red background for errors */
            color: #721c24; /* Dark red text */
            border: 1px solid #f5c6cb;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        /* Criteria specific grid/layout adjustment for ratings */
        #criteria-ratings-container {
            display: flex;
            flex-direction: column; /* Stack ratings vertically */
            gap: 20px;
            margin-top: 15px;
            padding: 15px;
            border: 1px solid #4a6681;
            border-radius: 8px;
            background-color: #2c3e50; 
        }

        /* Style for an individual rating block */
        .rating-level-card {
            padding: 15px;
            border: 1px dashed #4a6681;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <div class="header-container">
                <img th:src="@{/images/utmlogo.png}" alt="UTM Logo"/>
                <h1>UTM CAS</h1>
            </div>
        </div>
        
        <div class="card">
            <div id="submission-message"></div>

            <h1 th:text="${pageTitle} + ' for ' + ${criteria.assessment.title}">Add New Criteria Rubric</h1>

            <div class="button-container" style="justify-content: flex-start; margin-bottom: 25px;"> 
                <a th:href="${targetFormUrl}" class="btn btn-secondary" style="padding: 10px 20px; background-color: #3498db; color: white; border-radius: 5px; text-decoration: none;">
                    Switch to Likert Rubric Form
                </a>
            </div>
            
            <form id="criteriaForm" th:action="${formAction}" th:object="${criteria}" method="post">
                <input type="hidden" th:field="*{id}" />
                <input type="hidden" th:field="*{assessment}" />

                <div class="form-group">
                    <label>Criteria Name</label>
                    <input type="text" th:field="*{name}" required>
                </div>

                <div class="form-group">
                    <label>Evaluation Type</label>
                    <select th:field="*{evaluationType}" required>
                        <option value="">Select Evaluation Type</option>
                        <option th:each="type : ${evaluationTypes}" th:value="${type}" th:text="${type} + ' Evaluation'"></option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Applicable Assessment Type</label>
                    <select id="assessmentTypeSelect" required th:field="*{assessmentTypes}">
                        <option value="">Select Assessment Type</option>
                        <option th:each="option : ${assessmentTypesOptions}" 
                                th:value="${option}" 
                                th:text="${option}">
                        </option>
                    </select>
                    <input type="hidden" id="assessmentTypesHidden" th:field="*{assessmentTypes}" />
                </div>
                
                <div class="form-group">
                    <label>Total Marks</label>
                    <input type="number" id="criteriaMarks" step="0.01" th:field="*{marks}" required>
                </div>

                <div class="form-group">
                    <label>CLO</label>
                    <select th:field="*{clo}" required>
                        <option value="">Select CLO</option>
                        <option th:each="i : ${#numbers.sequence(1, 8)}" th:value="${i}" th:text="|CLO ${i}|">CLO</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>CLO Marks</label>
                    <input type="number" id="cloMarks" step="0.01" th:field="*{cloMarks}" readonly>
                </div>

                <hr style="border-color: #4a6681; margin: 20px 0;">
                
                <h2>Criteria Rating (5 Pre-set Levels)</h2>
                <p style="color: #95a5a6; font-style: italic;">
                    The 5 rating levels (0 to 4) are pre-set. The Mark is automatically set to equal the Level (e.g., Level 3 = 3.0 Mark).
                </p>

                <div id="criteria-ratings-container">
                    <div th:each="rating, iterStat : *{criteriaRatings}" class="rating-level-card">
                        <input type="hidden" th:field="*{criteriaRatings[__${iterStat.index}__].id}" />
                        <input type="hidden" th:field="*{criteriaRatings[__${iterStat.index}__].level}" />
                        <input type="hidden" class="rating-mark" th:field="*{criteriaRatings[__${iterStat.index}__].ratingMark}" />

                        <h4 style="color: #f39c12; margin-top: 0; border-bottom: 1px dotted #f39c12; padding-bottom: 5px;">
                            Level <span th:text="${rating.level}">0</span>
                        </h4>

                        <div class="form-group">
                            <label th:text="|Level ${rating.level} Name|"></label>
                            <input type="text" th:field="*{criteriaRatings[__${iterStat.index}__].name}" required readonly>
                        </div>
                        
                        <div class="form-group">
                            <label th:text="|Level ${rating.level} Description|"></label>
                            <textarea rows="2" th:field="*{criteriaRatings[__${iterStat.index}__].description}"></textarea>
                        </div>
                    </div>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn btn-primary">Save Criteria Rubric</button>
                </div>
            </form>
        </div>
    </div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        const criteriaMarksInput = document.getElementById('criteriaMarks');
        const cloMarksInput = document.getElementById('cloMarks');
        const form = document.getElementById('criteriaForm');
        const messageBox = document.getElementById('submission-message');
        
        // --- LOGIC FOR ASSESSMENT TYPE (Single Select) ---
        const assessmentTypeSelect = document.getElementById('assessmentTypeSelect');
        const assessmentTypesHidden = document.getElementById('assessmentTypesHidden');
        
        function updateAssessmentTypes() {
            if(assessmentTypeSelect) {
                // This ensures the hidden field, which is bound to the Spring model, gets the selected value
                assessmentTypesHidden.value = assessmentTypeSelect.value;
            }
        }
        
        if (assessmentTypeSelect) {
            assessmentTypeSelect.addEventListener('change', updateAssessmentTypes);
        }
        
        // Initial sync on load
        updateAssessmentTypes();
        // --------------------------------------------------------

        // Function to display a message 
        function showMessage(message, type = 'error') {
            messageBox.textContent = message;
            messageBox.style.display = 'block';
            messageBox.style.opacity = 1;
            
            // Set colors based on type (though we only use 'error' here)
            if (type === 'success') {
                messageBox.style.backgroundColor = '#d4edda'; // Light green
                messageBox.style.color = '#155724';         // Dark green
                messageBox.style.borderColor = '#c3e6cb';
            } else {
                messageBox.style.backgroundColor = '#f8d7da'; // Light red (error default)
                messageBox.style.color = '#721c24';         // Dark red
                messageBox.style.borderColor = '#f5c6cb';
            }
            
            setTimeout(() => {
                messageBox.style.opacity = 0;
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, 500);
            }, 5000);
        }

        // Sync CLO Marks with Criteria Marks
        criteriaMarksInput.addEventListener('input', function() {
            cloMarksInput.value = this.value;
        });

        // Initial sync on load (important for edit mode)
        if (criteriaMarksInput.value) {
            cloMarksInput.value = criteriaMarksInput.value;
        }

        // Form submission validation
        form.addEventListener('submit', function (event) {
            
            // --- VALIDATE ASSESSMENT TYPE SELECTION ---
            updateAssessmentTypes();
            if (!assessmentTypesHidden.value) {
                showMessage('You must select an Applicable Assessment Type.');
                event.preventDefault(); return;
            }
            // ---------------------------------------------
            
            // NOTE: Validation for Rating Level Names is removed 
            // because they are now read-only and must be handled server-side 
            // or pre-filled in the model.
        });
    });
</script>
</body>
</html>

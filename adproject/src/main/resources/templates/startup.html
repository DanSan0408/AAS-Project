<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Start Application</title>
    <!-- Use the existing login.css for base styling -->
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <!-- Logo Container - Now floating directly on the background -->
    <div class="logo-container">
        <img src="/images/bulat_cas.png" alt="UTM CAS Logo" class="big-round-logo large-logo-on-startup"/>
    </div>
    
    <!-- Start Button linking to the Login Page -->
    <!-- Using a new wrapper class to control the button's width -->
    <div class="start-button-wrapper">
        <a href="/login" class="auth-btn btn-primary-custom">
            START
        </a>
    </div>

    <!-- Custom styling to remove the container look and enforce layout -->
    <style>
        /* Animation for the logo */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); }
            50% { transform: scale(1.03); box-shadow: 0 0 20px rgba(97, 165, 250, 0.5); }
            100% { transform: scale(1); box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); }
        }

        /* Animation for the button */
        @keyframes subtle-bounce {
            0%, 100% { transform: translateY(0); }
            20%, 80% { transform: translateY(-2px); }
        }

        /* OVERRIDE: Set body to stack elements vertically and center content */
        body {
            flex-direction: column;
            /* Add some padding to prevent the large logo from hitting the screen edges */
            padding-top: 60px;
            padding-bottom: 60px;
        }

        /* Logo Styling: Massive size and removal of card-like border/shadow */
        .large-logo-on-startup {
            width: 600px;
            height: 550px;
            animation: pulse 4s infinite ease-in-out;
            
            /* Remove the border and shadow from the logo itself (part of the 'card' look) */
            border: none !important;
            box-shadow: none !important;
        }
        
        .auth-btn:hover {
            animation: subtle-bounce 0.6s ease-in-out;
        }

        /* NEW: Wrapper to constrain button width and provide vertical spacing */
        .start-button-wrapper {
            width: 600px;
            max-width: 90%;
            margin-top: 40px; /* Space between logo and button */
            text-align: center;
        }

        /* Ensure .logo-container remains centered and doesn't introduce unwanted margins */
        .logo-container {
             margin-bottom: 0; /* Clear existing margin */
        }
    </style>
</body>
</html>

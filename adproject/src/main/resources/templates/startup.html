<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Select Role</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="auth-container">
        <h3 class="card-title mb-4">Select Your Role to Login</h3>
        <div class="d-grid gap-2">
            <a href="/login?userRole=admin" class="auth-btn btn-primary-custom">Admin</a>
            <a href="/login?userRole=student" class="auth-btn btn-success-custom">Student</a>
            <a href="/login?userRole=info-supervisor" class="auth-btn btn-info-custom">Industrial Supervisor</a>
            <a href="/login?userRole=lecturer" class="auth-btn btn-warning-custom">Lecturer</a>
        </div>
    </div>
</body>
</html>

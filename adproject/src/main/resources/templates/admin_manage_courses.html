<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Courses</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin_sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin_home.css}">
    <link rel="stylesheet" th:href="@{/css/admin_manage_courses.css}">
</head>
<body class="admin-page">
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <div class="header-container">
                <img th:src="@{/images/utmlogo.png}" alt="UTM Logo"/>
                <h1>UTM AAS</h1>
            </div>
        </div>

        <div class="container manage-courses-container">
            <div th:if="${successMessage}" class="alert alert-success" role="alert">
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="card manage-course-card">
                <div class="card-body">
                    <h4 class="card-title">Add New Course</h4>
                    <form th:action="@{/admin/courses/add}" th:object="${newCourse}" method="post">
                        <div class="form-group">
                            <label for="courseName">Course Name</label>
                            <input type="text" id="courseName" th:field="*{courseName}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="courseCode">Course Code</label>
                            <input type="text" id="courseCode" th:field="*{courseCode}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" th:field="*{description}" class="form-control"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Add Course</button>
                    </form>
                </div>
            </div>

            <div class="card manage-course-card">
                <div class="card-body">
                    <h4 class="card-title">Existing Courses</h4>
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Course Name</th>
                                    <th>Course Code</th>
                                    <th>Description</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="course : ${courses}">
                                    <td th:text="${course.id}"></td>
                                    <td th:text="${course.courseName}"></td>
                                    <td th:text="${course.courseCode}"></td>
                                    <td th:text="${course.description}"></td>
                                    <td>
                                        <div class="table-actions">
                                            <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-info"><i class="fas fa-edit"></i> Edit</a>
                                            <form th:action="@{/admin/courses/delete/{id}(id=${course.id})}" method="post"
                                                  class="inline-action"
                                                  data-action="confirm-submit"
                                                  data-confirm-message="Are you sure you want to delete this course? This action cannot be undone.">
                                                <button type="submit" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i> Delete</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${courses == null || courses.isEmpty()}">
                                    <td colspan="5" class="text-center text-muted">No courses available.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/event-delegation.js}" th:attr="nonce=${cspNonce}"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course</title>
    <link rel="stylesheet" th:href="@{/css/superadmin_home.css}">
    <link rel="stylesheet" th:href="@{/css/manage_courses.css}">
</head>
<body class="superadmin-page">
    <div th:replace="~{fragments/superadmin_sidebar :: superadmin_sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <h2>Edit Course</h2>
            <div class="user-info">
                Welcome, <span th:text="${superAdminUsername}">Super Admin</span>!
            </div>
        </div>

        <div class="container manage-courses-container">
            <div th:if="${successMessage}" class="alert alert-success" role="alert">
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="card form-card">
                <div class="card-body">
                    <h3>Edit Course Details</h3>
                    <form th:action="@{/superadmin/courses/update}" th:object="${course}" method="post">
                        <input type="hidden" th:field="*{id}" />
                        <div class="form-group">
                            <label for="courseName">Course Name</label>
                            <input type="text" id="courseName" th:field="*{courseName}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="courseCode">Course Code</label>
                            <input type="text" id="courseCode" th:field="*{courseCode}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" th:field="*{description}" class="form-control" rows="4"></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Update Course</button>
                            <a th:href="@{/superadmin/manage-courses}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/course-validation.js}" th:attr="nonce=${cspNonce}"></script>
</body>
</html>

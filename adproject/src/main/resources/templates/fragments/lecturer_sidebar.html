<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>
    <th:block th:fragment="sidebar">
    <button type="button" class="sidebar-toggle" aria-label="Toggle navigation menu" aria-expanded="false">☰</button>
    <div class="sidebar-overlay" aria-hidden="true"></div>
    <div class="sidebar">
        <div class="logo">
            <h2>UTM AAS</h2>
        </div>
        
        <div class="user-profile">
            <span sec:authentication="name"></span>
        </div>
        
        <ul class="menu-list">
            <!-- Consistent Course Switcher -->
            <li class="sidebar-item" th:if="${managedCourses != null && !managedCourses.isEmpty()}">
                <div class="course-switcher">
                    <form th:action="@{/lecturer/switch-course}" method="post" id="courseSwitchForm" class="course-switch-form">
                        <label for="courseSwitchSelect" class="sr-only">Switch Course</label>
                        <select name="courseId" id="courseSwitchSelect" class="course-switch-select">
                            <option value="">Switch Course</option>
                            <option th:each="course : ${managedCourses}"
                                    th:value="${course.id}"
                                    th:text="${course.courseCode + ' - ' + course.courseName}"
                                    th:selected="${activeCourseId == course.id}">
                            </option>
                        </select>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    </form>
                </div>
            </li>
            <li class="sidebar-item">
                <a class="sidebar-link" th:href="@{/lecturer/home}"><span>Dashboard</span></a>
            </li>
            <li class="sidebar-item">
                <a class="sidebar-link" th:href="@{/lecturer/assessments}"><span>Assess Students</span></a>
            </li>
            <li class="sidebar-item">
                <a class="sidebar-link" th:href="@{/lecturer/comments/view/assessments}"><span>View Comments</span></a>
            </li>
            <li class="sidebar-item">
                <a class="sidebar-link" th:href="@{/profile}"><span>My Profile</span></a>
            </li>
            <li class="sidebar-item" sec:authorize="hasRole('ROLE_ADMIN')">
                <a th:href="@{/admin/home}" class="sidebar-link"><span>Switch to Admin</span></a>
            </li>
            <li class="sidebar-item" sec:authorize="hasRole('ROLE_SUPER_ADMIN')">
                <a th:href="@{/superadmin/home}" class="sidebar-link"><span>Back to Super Admin</span></a>
            </li>
            <li class="sidebar-item logout-item">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="sidebar-link logout-btn"><span>Logout</span></button>
                </form>
            </li>
        </ul>
    </div>

    <script th:src="@{/js/sidebar-toggle.js}"></script>
    </th:block>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="stylesheet" th:href="@{/css/lecturer_sidebar.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar" th:fragment="sidebar">
        <div class="logo">
            <h2>UTM AAS</h2>
        </div>
        
        <div class="user-profile">
            <span sec:authentication="name"></span>
        </div>
        
        <ul class="menu-list">
            <li>
                <a th:href="@{/lecturer/home}">
                    Dashboard
                </a>
            </li>
            
            <li>
                <a th:href="@{/lecturer/assessments}">
                    Assess Students
                </a>
            </li>
            
            <li sec:authorize="hasRole('ROLE_ADMIN')">
                <a th:href="@{/admin/home}" class="switch-role-btn">
                    Switch to Admin
                </a>
            </li>

            <li sec:authorize="hasRole('ROLE_SUPERVISOR')">
                <a th:href="@{/supervisor/home}" class="switch-role-btn">
                    Switch to Supervisor
                </a>
            </li>
            
            <li class="logout-item">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="logout-btn">
                        Logout
                    </button>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                </form>
            </li>
        </ul>
    </div>
</body>
</html>

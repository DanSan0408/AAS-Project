<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!-- Removed head section as it's invalid in a fragment -->
<body>
    <th:block th:fragment="sidebar">
    <button type="button" class="sidebar-toggle" aria-label="Toggle navigation menu" aria-expanded="false">☰</button>
    <div class="sidebar-overlay" aria-hidden="true"></div>
    <div class="sidebar">
        <div class="logo">
            <h2>UTM AAS</h2>
        </div>
        
        <div class="user-profile">
            <span sec:authentication="name"></span>
        </div>
        
        <ul class="menu-list">
            <li>
                <a th:href="@{/lecturer/home}">
                    Dashboard
                </a>
            </li>
            
            <li>
                <a th:href="@{/lecturer/assessments}">
                    Assess Students
                </a>
            </li>
            
            <li class="nav-item">
            <a class="nav-link" th:href="@{/lecturer/comments/view/assessments}">
                <i class="fas fa-comments"></i>
                <span>Student Comments View</span>
            </a>
        </li>

            <li sec:authorize="hasRole('ROLE_ADMIN')">
                <a th:href="@{/admin/home}" class="switch-role-btn">
                    Switch to Admin
                </a>
            </li>

            <li sec:authorize="hasRole('ROLE_SUPER_ADMIN')" style="background-color: #f8f9fa; border-top: 1px solid #ddd; padding-top: 10px; margin-top: 10px;">
                <a th:href="@{/superadmin/home}" class="switch-role-btn" style="color: #c27803; font-weight: bold;">⬆️ Back to Super Admin</a>
            </li>
            
            <li class="logout-item">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="logout-btn">
                        Logout
                    </button>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                </form>
            </li>
        </ul>
    </div>

    <script>
        (function() {
            var body = document.body;
            var sidebarToggle = document.querySelector('.sidebar-toggle');
            var sidebarOverlay = document.querySelector('.sidebar-overlay');
            var lastScrollY = 0;

            function lockBodyScroll() {
                lastScrollY = window.scrollY || window.pageYOffset || 0;
                body.style.position = 'fixed';
                body.style.top = '-' + lastScrollY + 'px';
                body.style.left = '0';
                body.style.right = '0';
                body.style.width = '100%';
            }

            function unlockBodyScroll() {
                body.style.position = '';
                body.style.top = '';
                body.style.left = '';
                body.style.right = '';
                body.style.width = '';
                window.scrollTo(0, lastScrollY);
            }

            function closeSidebar() {
                body.classList.remove('sidebar-open');
                unlockBodyScroll();
                if (sidebarToggle) {
                    sidebarToggle.setAttribute('aria-expanded', 'false');
                }
            }

            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', function() {
                    var willOpen = !body.classList.contains('sidebar-open');
                    body.classList.toggle('sidebar-open');
                    if (willOpen) {
                        lockBodyScroll();
                    } else {
                        unlockBodyScroll();
                    }
                    sidebarToggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
                });
            }

            if (sidebarOverlay) {
                sidebarOverlay.addEventListener('click', closeSidebar);
            }

            window.addEventListener('resize', function() {
                if (window.innerWidth > 1279) {
                    closeSidebar();
                }
            });
        })();
    </script>
    </th:block>
</body>
</html>

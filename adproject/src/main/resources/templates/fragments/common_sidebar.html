<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <div class="sidebar" th:fragment="sidebar">
        <div class="logo">
            <h2>UTM CAS</h2>
        </div>
        <div class="user-profile">
            <img th:if="${photoUrl != null}" th:src="${photoUrl}" alt="Profile Photo">
            <div th:if="${photoUrl == null}" class="initials-placeholder" th:text="${initial}"></div>
            <span sec:authentication="name"></span>
        </div>
        <ul class="menu-list">
            <li th:if="${userRole == 'STUDENT'}"><a href="/student/home">Dashboard</a></li>
            <li th:if="${userRole == 'LECTURER'}"><a href="/lecturer/home">Dashboard</a></li>
            <li th:if="${userRole == 'SUPERVISOR'}"><a href="/supervisor/home">Dashboard</a></li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <button type="submit">Logout</button>
                    <input type="hidden" th:name="_csrf" th:value="${_csrf.token}" />
                </form>
            </li>
        </ul>
    </div>
</body>
</html>

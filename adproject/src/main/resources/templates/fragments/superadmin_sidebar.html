<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Super Admin Sidebar</title>
</head>
<body>
    <th:block th:fragment="superadmin_sidebar">
    <button type="button" class="sidebar-toggle" aria-label="Toggle navigation menu" aria-expanded="false">☰</button>
    <div class="sidebar-overlay" aria-hidden="true"></div>
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>UTM CAS</h3>
            <p>Super Admin</p>
        </div>
        <ul class="list-unstyled components">
            <li>
                <a th:href="@{/superadmin/home}">🏠 Dashboard</a>
            </li>
            
            <!-- Super Admin Features -->
            <li class="role-divider">
                <strong style="font-size: 0.85rem; color: #666;">GLOBAL MANAGEMENT</strong>
            </li>
            <li>
                <a th:href="@{/superadmin/manage-courses}">📚 Manage Courses</a>
            </li>
            <li>
                <a th:href="@{/superadmin/invite-admin}">✉️ Invite Admin</a>
            </li>
            
            <!-- Role Switching -->
            <li class="role-divider">
                <strong style="font-size: 0.85rem; color: #666;">SWITCH ROLE</strong>
            </li>
            <li class="role-switch-link">
                <a th:href="@{/admin/home}">📋 Admin View</a>
            </li>
            <li class="role-switch-link">
                <a th:href="@{/lecturer/home}">👨‍🏫 Lecturer View</a>
            </li>
            
            <!-- Logout -->
            <li class="role-divider"></li>
            <li>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-link logout-btn">🚪 Logout</button>
                </form>
            </li>
        </ul>
    </div>

    <script>
        (function() {
            var body = document.body;
            var sidebarToggle = document.querySelector('.sidebar-toggle');
            var sidebarOverlay = document.querySelector('.sidebar-overlay');
            var lastScrollY = 0;

            function lockBodyScroll() {
                lastScrollY = window.scrollY || window.pageYOffset || 0;
                body.style.position = 'fixed';
                body.style.top = '-' + lastScrollY + 'px';
                body.style.left = '0';
                body.style.right = '0';
                body.style.width = '100%';
            }

            function unlockBodyScroll() {
                body.style.position = '';
                body.style.top = '';
                body.style.left = '';
                body.style.right = '';
                body.style.width = '';
                window.scrollTo(0, lastScrollY);
            }

            function closeSidebar() {
                body.classList.remove('sidebar-open');
                unlockBodyScroll();
                if (sidebarToggle) {
                    sidebarToggle.setAttribute('aria-expanded', 'false');
                }
            }

            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', function() {
                    var willOpen = !body.classList.contains('sidebar-open');
                    body.classList.toggle('sidebar-open');
                    if (willOpen) {
                        lockBodyScroll();
                    } else {
                        unlockBodyScroll();
                    }
                    sidebarToggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
                });
            }

            if (sidebarOverlay) {
                sidebarOverlay.addEventListener('click', closeSidebar);
            }

            window.addEventListener('resize', function() {
                if (window.innerWidth > 1279) {
                    closeSidebar();
                }
            });
        })();
    </script>
    </th:block>
</body>
</html>

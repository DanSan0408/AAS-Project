<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
    </head>
<body>
    <div class="sidebar" th:fragment="sidebar">
        <div class="logo">
            <h2>UTM AAS</h2>
        </div>
        <div class="user-profile">
            <span sec:authentication="name"></span>
        </div>
        <ul class="menu-list">
            <li><a href="/admin/home">Dashboard</a></li>
            <li><a href="/admin/manage-users">Manage Users</a></li>
            <li><a href="/rubrics/manage">Manage Assessments</a></li>
            <li><a href="/admin/data-views">Data Views</a></li>
            <li sec:authorize="hasRole('ROLE_LECTURER')">
                <a th:href="@{/lecturer/home}" class="switch-role-btn">Switch to Lecturer</a>
            </li>
            <li sec:authorize="hasRole('ROLE_SUPERVISOR')">
                <a th:href="@{/supervisor/home}" class="switch-role-btn">Switch to Supervisor</a>
            </li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <button type="submit">Logout</button>
                    <input type="hidden" th:name="_csrf" th:value="${_csrf.token}" />
                </form>
            </li>
        </ul>
    </div>
</body>
</html>

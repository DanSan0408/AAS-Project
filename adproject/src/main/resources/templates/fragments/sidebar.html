<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
    </head>
<body>
    <th:block th:fragment="sidebar">
    <button type="button" class="sidebar-toggle" aria-label="Toggle navigation menu" aria-expanded="false">☰</button>
    <div class="sidebar-overlay" aria-hidden="true"></div>
    <div class="sidebar">
        <div class="logo">
            <h2>UTM AAS</h2>
        </div>
        <div class="user-profile">
            <span sec:authentication="name"></span>
        </div>
        <ul class="menu-list">
            <li class="course-switcher-item" th:if="${managedCourses != null and !#lists.isEmpty(managedCourses)}">
                <form id="courseSwitcherForm" th:action="@{/admin/switch-course}" method="post" class="course-switcher-form">
                    <label for="activeCourseSelect">Active Course</label>
                    <select id="activeCourseSelect" name="courseId" onchange="this.form.submit()">
                        <option th:each="course : ${managedCourses}"
                                th:value="${course.id}"
                                th:selected="${activeCourseId != null and activeCourseId == course.id}"
                                th:text="${course.courseCode + ' - ' + course.courseName}">Course</option>
                    </select>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                </form>
            </li>
            <li><a href="/admin/home">Dashboard</a></li>
            <li><a href="/admin/manage-users">Manage Users</a></li>
            <li><a href="/admin/manage-courses">Manage Courses</a></li>
            <li><a href="/rubrics/manage">Manage Assessments</a></li>
            <li><a href="/admin/data-views">Data Views</a></li>
            <li class="nav-item">
            <a class="nav-link" th:href="@{/admin/comments/view/assessments}">
                <i class="fas fa-comments"></i>
                <span>View Comments</span>
            </a>
        </li>
            <li sec:authorize="hasRole('ROLE_LECTURER')">
                <a th:href="@{/lecturer/home}" class="switch-role-btn">Switch to Lecturer</a>
            </li>
            <li sec:authorize="hasRole('ROLE_SUPER_ADMIN')" style="background-color: #f8f9fa; border-top: 1px solid #ddd; padding-top: 10px; margin-top: 10px;">
                <a th:href="@{/superadmin/home}" class="switch-role-btn" style="color: #c27803; font-weight: bold;">⬆️ Back to Super Admin</a>
            </li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <button type="submit">Logout</button>
                    <input type="hidden" th:name="_csrf" th:value="${_csrf.token}" />
                </form>
            </li>
        </ul>
    </div>

    <script th:inline="javascript">
        (function() {
            var body = document.body;
            var sidebarToggle = document.querySelector('.sidebar-toggle');
            var sidebarOverlay = document.querySelector('.sidebar-overlay');
            var lastScrollY = 0;

            function lockBodyScroll() {
                lastScrollY = window.scrollY || window.pageYOffset || 0;
                body.style.position = 'fixed';
                body.style.top = '-' + lastScrollY + 'px';
                body.style.left = '0';
                body.style.right = '0';
                body.style.width = '100%';
            }

            function unlockBodyScroll() {
                body.style.position = '';
                body.style.top = '';
                body.style.left = '';
                body.style.right = '';
                body.style.width = '';
                window.scrollTo(0, lastScrollY);
            }

            function closeSidebar() {
                body.classList.remove('sidebar-open');
                unlockBodyScroll();
                if (sidebarToggle) {
                    sidebarToggle.setAttribute('aria-expanded', 'false');
                }
            }

            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', function() {
                    var willOpen = !body.classList.contains('sidebar-open');
                    body.classList.toggle('sidebar-open');
                    if (willOpen) {
                        lockBodyScroll();
                    } else {
                        unlockBodyScroll();
                    }
                    sidebarToggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
                });
            }

            if (sidebarOverlay) {
                sidebarOverlay.addEventListener('click', closeSidebar);
            }

            window.addEventListener('resize', function() {
                if (window.innerWidth > 1279) {
                    closeSidebar();
                }
            });

            var form = document.getElementById('courseSwitcherForm');
            var select = document.getElementById('activeCourseSelect');
            if (!form || !select) {
                return;
            }

            // Use standard form POST so session state is committed before navigation.
            select.addEventListener('change', function() {
                form.submit();
            });
        })();
    </script>
    </th:block>
</body>
</html>

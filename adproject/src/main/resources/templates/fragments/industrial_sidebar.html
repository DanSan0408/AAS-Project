<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
<body>
    <div class="sidebar" th:fragment="sidebar">
        <div class="logo">
            <h2>UTM CAS</h2>
        </div>
        <div class="user-profile">
        <p><span sec:authentication="name"></span></p>
        <p style="font-size: 12px; color: #ffffff;"></p>
    </div>
        <ul class="menu-list">
            <!-- Dashboard -->
            <li><a href="/supervisor/home">Dashboard</a></li>
            
            <!-- Evaluate Groups -->
            <li><a href="/supervisor/evaluate">Evaluate Groups</a></li>
            
            <!-- Logout -->
            <li>
                <form th:action="@{/logout}" method="post">
                    <button type="submit">Logout</button>
                    <input type="hidden" th:name="_csrf" th:value="${_csrf.token}" />
                </form>
            </li>
        </ul>
    </div>
</body>
</html>

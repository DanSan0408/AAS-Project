<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Rubrics</title>
    <link rel="stylesheet" th:href="@{/css/rubric.css}">
</head>
<body>
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <div class="main-content">
        <div class="header">
            <div class="header-container">
                <img th:src="@{/images/utmlogo.png}" alt="UTM Logo"/>
                <h1>UTM CAS</h1>
            </div>
        </div>
        
    <div class="container my-5">
        <h1>Manage Assessments and Rubrics</h1>
        <a th:href="@{/rubrics/add-assessment}" class="btn btn-primary mb-3">Add New Assessment</a>

        <div th:if="${message}" class="alert alert-success" role="alert">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <span th:text="${error}"></span>
        </div>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Assessment Title</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="assessment : ${assessments}">
                    <td th:text="${assessment.id}"></td>
                    <td th:text="${assessment.title}"></td>
                    <td>
                        <a th:href="@{/rubrics/add-rubric/{id}(id=${assessment.id})}" class="btn btn-info btn-sm">Add Rubric</a>
                        <a th:href="@{/rubrics/edit-assessment/{id}(id=${assessment.id})}" class="btn btn-warning btn-sm">Edit</a>
                        <a th:href="@{/rubrics/delete-assessment/{id}(id=${assessment.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this assessment?');">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>

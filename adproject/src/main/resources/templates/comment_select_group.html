<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Group</title>
    
    <link rel="stylesheet" th:href="@{/css/admin_sidebar.css}">
    <!-- Removed lecturer sidebar link as this template is now admin-specific -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background-color: #F4F2EE; margin: 0; overflow-x: hidden; }
        .main-content { margin-left: 270px; padding: 40px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; width: calc(100% - 270px); max-width: 100%; }
        .header-container { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; width: 100%; max-width: 1000px; }
        .header-container img { max-width: 200px; height: auto; }
        .header-container h1 { margin: 0; color: #4A0018; font-size: 2.5rem; font-weight: 700; }
        
        .page-content { padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 1000px; border: 1px solid #E5E7EB; margin: 0 auto; }
        .page-content h2 { color: #4A0018; border-bottom: 3px solid #4A0018; padding-bottom: 15px; margin-bottom: 25px; text-align: center; overflow-wrap: anywhere; }
        
        .table-responsive { width: 100%; max-width: 100%; overflow-x: hidden; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #E5E7EB; text-align: left; overflow-wrap: anywhere; word-break: break-word; }
        th { background-color: #f8f9fa; color: #3F3F46; font-weight: 600; }
        td { overflow-wrap: anywhere; word-break: break-word; }
        
        .btn-primary { background-color: #4A0018; color: white; padding: 10px 18px; text-decoration: none; border-radius: 6px; border: none; cursor: pointer; display: inline-block; font-weight: 600; transition: filter 0.2s; }
        .btn-primary:hover { filter: brightness(110%); }
        .btn-secondary { background-color: #3F3F46; color: white; padding: 10px 18px; text-decoration: none; border-radius: 6px; border: none; cursor: pointer; display: inline-block; font-weight: 600; transition: filter 0.2s; max-width: 100%; white-space: normal; overflow-wrap: anywhere; }
        .btn-secondary:hover { filter: brightness(110%); }
        
        .alert-info { color: #31708f; background-color: #d9edf7; border: 1px solid #bce8f1; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .alert-danger { color: #a94442; background-color: #f2dede; border: 1px solid #ebccd1; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        
        @media (max-width: 1279px) {
            .main-content { margin-left: 0; width: 100%; padding: 84px 20px 20px; }
            .header-container { flex-direction: column; gap: 10px; text-align: center; }
            .header-container h1 { font-size: 2rem; }
            .page-content { padding: 20px; }
        }

        @media (max-width: 1024px) {
            .page-content { padding: 14px; }
            .page-content h2 { font-size: 1.3rem; margin-bottom: 16px; }
            th, td { padding: 10px; }
            table, thead, tbody, tr, th, td {
                display: block;
                width: 100%;
            }
            thead {
                display: none;
            }
            tbody tr {
                border: 1px solid #E5E7EB;
                border-radius: 8px;
                background: #FFFFFF;
                padding: 10px;
                margin-bottom: 10px;
            }
            tbody td {
                border: none;
                padding: 6px 0;
            }
            tbody td:nth-child(1)::before { content: "Group ID: "; font-weight: 600; color: #4A0018; }
            tbody td:nth-child(2)::before { content: "Group Name: "; font-weight: 600; color: #4A0018; }
            tbody td:nth-child(3)::before { content: "Size: "; font-weight: 600; color: #4A0018; }
            tbody td:nth-child(4)::before { content: "Academic Supervisor: "; font-weight: 600; color: #4A0018; }
            tbody td:nth-child(5)::before { content: "Industrial Supervisor: "; font-weight: 600; color: #4A0018; }
            tbody td:nth-child(6)::before { content: "Action: "; font-weight: 600; color: #4A0018; }
            .btn-primary, .btn-secondary { width: 100%; text-align: center; }
        }

        @media (max-width: 640px) {
            .main-content { padding: 80px 12px 16px; }
            .header-container { flex-direction: column; }
            .header-container img { max-width: 96px; }
            .header-container h1 { font-size: 1.5rem; }
        }

        @media (max-width: 420px) {
            .main-content { padding: 74px 8px 12px; }
            .page-content { padding: 10px; border-radius: 10px; }
            .header-container { margin-bottom: 14px; gap: 6px; }
            .header-container img { max-width: 72px; }
            .header-container h1 { font-size: 1.2rem; line-height: 1.2; }
            .page-content h2 { font-size: 1.05rem; line-height: 1.3; margin-bottom: 12px; }
            tbody tr { padding: 8px; margin-bottom: 8px; }
            tbody td { padding: 4px 0; font-size: 0.92rem; }
            tbody td::before { display: block; margin-bottom: 2px; }
            .btn-primary,
            .btn-secondary { font-size: 0.9rem; padding: 10px 12px; }
        }

        @media (max-width: 375px) {
            .main-content { padding: 72px 6px 10px; }
            .page-content { padding: 8px; }
            .page-content h2 { font-size: 1rem; }
            tbody td { font-size: 0.88rem; }
            .btn-primary,
            .btn-secondary { font-size: 0.85rem; padding: 9px 10px; }
        }
    </style>
</head>
<body class="admin-page">
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>
    <!-- Removed conditional sidebar loading as this template is now admin-specific -->
    <div class="main-content">
        <div class="header-container">
            <img th:src="@{/images/logoUTM.png}" alt="UTM Logo"/>
            <h1>UTM AAS</h1>
        </div>

        <div class="page-content">
            <h2>Select Group - <span th:text="${assessment.title}" style="color: #F8A617;"></span></h2>
            
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            
            <div class="alert alert-info" th:if="${!isAdmin}">
                Showing only groups where you are assigned as the Academic or Industrial Supervisor.
            </div>
            
            <div class="table-responsive">
                <table class="table table-striped table-bordered mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>Group ID</th>
                            <th>Group Name</th>
                            <th>Size</th>
                            <th>Academic Supervisor</th>
                            <th>Industrial Supervisor</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="group : ${groups}">
                            <td th:text="${group.id}"></td>
                            <td th:text="${group.groupName}"></td>
                            <td th:text="${group.groupSize}"></td>
                            <td th:text="${group.academicSupervisor != null ? group.academicSupervisor.email : 'Unassigned'}"></td>
                            <td th:text="${group.industrialSupervisor != null ? group.industrialSupervisor.email : 'Unassigned'}"></td>
                            <td>
                                <a th:href="@{'/' + ${role} + '/comments/view/assessment/' + ${assessment.id} + '/group/' + ${group.id}}" class="btn btn-primary btn-sm">View Comments</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(groups)}">
                            <td colspan="6" class="text-center" style="text-align: center;">No groups available for your supervision.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <br>
            <a th:href="@{'/' + ${role} + '/comments/view/assessments'}" class="btn btn-secondary mt-3">Back to Assessments</a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Admin</title>
    <link rel="stylesheet" th:href="@{/css/superadmin_home.css}">
    <link rel="stylesheet" th:href="@{/css/manage_courses.css}">
</head>
<body class="superadmin-page">
    <div th:replace="~{fragments/superadmin_sidebar :: superadmin_sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <h2>Invite New Admin</h2>
            <div class="user-info">
                Welcome, <span th:text="${superAdminUsername}">Super Admin</span>!
            </div>
        </div>

        <div class="container manage-courses-container">
            <div th:if="${successMessage}" class="alert alert-success" role="alert">
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="card form-card">
                <div class="card-body">
                    <h3>Admin Invitation Details</h3>
                    <form th:action="@{/superadmin/invite-admin}" method="post">
                        <div class="form-group">
                            <label for="email">Admin Email</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="name">Admin Name</label>
                            <input type="text" id="name" name="name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="courseId">Assign to Course</label>
                            <select id="courseId" name="courseId" class="form-control">
                                <option value="">No course assignment (optional)</option>
                                <option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.courseName + ' (' + course.courseCode + ')'}"></option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Send Invitation</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Admin</title>
    <link rel="stylesheet" th:href="@{/css/superadmin_home.css}">
    <link rel="stylesheet" th:href="@{/css/manage_courses.css}">
</head>
<body class="superadmin-page">
    <div th:replace="~{fragments/superadmin_sidebar :: superadmin_sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <h2>Invite New Admin</h2>
            <div class="user-info">
                Welcome, <span th:text="${superAdminUsername}">Super Admin</span>!
            </div>
        </div>

        <div class="container manage-courses-container">
            <div th:if="${successMessage}" class="alert alert-success" role="alert">
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="card form-card">
                <div class="card-body">
                    <h3>Admin Invitation Details</h3>
                    <form th:action="@{/superadmin/invite-admin}" method="post">
                        <div class="form-group">
                            <label for="email">Admin Email</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="name">Admin Name</label>
                            <input type="text" id="name" name="name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="courseId">Assign to Course</label>
                            <select id="courseId" name="courseId" class="form-control">
                                <option value="">No course assignment (optional)</option>
                                <option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.courseName + ' (' + course.courseCode + ')'}"></option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Send Invitation</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card form-card" style="margin-top: 20px;">
                <div class="card-body">
                    <h3>Manage Existing Admins</h3>
                    <p style="margin-bottom: 12px; color: #666;">Delete invited admin accounts from here.</p>
                    <div th:if="${#lists.isEmpty(admins)}">No admin accounts found.</div>
                    <table th:if="${not #lists.isEmpty(admins)}" class="table table-striped" style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr>
                                <th style="text-align: left; padding: 8px;">Email</th>
                                <th style="text-align: left; padding: 8px;">Name</th>
                                <th style="text-align: left; padding: 8px;">Assigned Courses</th>
                                <th style="text-align: left; padding: 8px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="admin : ${admins}">
                                <td style="padding: 8px;" th:text="${admin.email}">admin@example.com</td>
                                <td style="padding: 8px;" th:text="${admin.username != null and !#strings.isEmpty(admin.username) ? admin.username : '-'}">-</td>
                                <td style="padding: 8px;">
                                    <span th:if="${#lists.isEmpty(adminManagedCoursesMap[admin.id])}">No course assigned</span>
                                    <span th:if="${not #lists.isEmpty(adminManagedCoursesMap[admin.id])}" th:text="${#strings.listJoin(adminManagedCoursesMap[admin.id].![courseCode], ', ')}">CSE101</span>
                                </td>
                                <td style="padding: 8px;">
                                    <form th:action="@{/superadmin/admins/delete/{id}(id=${admin.id})}" method="post"
                                          th:if="${admin.email != superAdminUsername}"
                                          onsubmit="return confirm('Delete this admin account? This action cannot be undone.');">
                                        <button type="submit" class="btn btn-danger">Delete</button>
                                    </form>
                                    <span th:if="${admin.email == superAdminUsername}" style="color: #999;">Current account</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

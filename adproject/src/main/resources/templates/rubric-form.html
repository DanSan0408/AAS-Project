<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Rubric Form</title>
    <link rel="stylesheet" th:href="@{/css/rubric.css}">
    <style>
        /* Additional specific styles for this form */
        #submission-message {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-weight: bold;
            text-align: center;
            z-index: 1000;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        
        .rating-item {
            border: 1px solid #4a6681;
            padding: 15px;
            border-radius: 8px;
            background-color: #2c3e50;
        }
        
        .rating-label {
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
            display: block;
            font-size: 18px;
        }
        
        .info-text {
            font-size: 0.9em;
            color: #95a5a6;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .button-container {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .form-section-header {
            border-bottom: 2px solid #4a6681;
            padding-bottom: 10px;
            margin-bottom: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <div class="header-container">
                <img th:src="@{/images/utmlogo.png}" alt="UTM Logo"/>
                <h1>UTM CAS</h1>
            </div>
        </div>
        
        <div class="card">
            <div id="submission-message"></div>

            <h1 th:text="${pageTitle} + ' for ' + ${rubric.assessment.title}">Add New Rubric</h1>
            
            <div class="button-container" style="justify-content: flex-start; margin-bottom: 25px;"> 
                <a th:href="${targetFormUrl}" class="btn btn-secondary">
                    Switch to Criteria Rubric Form
                </a>
            </div>
            
            <form id="rubricForm" th:action="${formAction}" th:object="${rubric}" method="post">
                <input type="hidden" th:field="*{id}" />
                <input type="hidden" th:field="*{assessment}" />

                <div class="form-group">
                    <label>Rubric Name</label>
                    <input type="text" th:field="*{name}" required>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label>Evaluation Type</label>
                    <select th:field="*{evaluationType}" required>
                        <option value="">Select Evaluation Type</option>
                        <option th:each="type : ${evaluationTypes}" th:value="${type}" th:text="${type} + ' Evaluation'"></option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Applicable Assessment Type</label>
                    <select id="assessmentTypeSelect" required th:field="*{assessmentTypes}">
                        <option value="">Select Assessment Type</option>
                        <option th:each="option : ${assessmentTypesOptions}" 
                                th:value="${option}" 
                                th:text="${option}">
                        </option>
                    </select>
                    <input type="hidden" id="assessmentTypesHidden" th:field="*{assessmentTypes}" />
                </div>

                <div class="form-group">
                    <label>Total Marks</label>
                    <input type="number" id="rubricMarks" step="0.01" th:field="*{marks}" required>
                </div>

                <div class="form-group">
                    <label>CLO</label>
                    <select th:field="*{clo}" required>
                        <option value="">Select CLO</option>
                        <option th:each="i : ${#numbers.sequence(1, 8)}" th:value="${i}" th:text="|CLO ${i}|">CLO</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>CLO Marks</label>
                    <input type="number" id="cloMarks" step="0.01" th:field="*{cloMarks}" readonly>
                </div>

                <hr style="border-color: #4a6681; margin: 30px 0;">
                
                <h2 class="form-section-header">Sub-Rubrics (5-Point Likert Scale)</h2>
                
                <div id="sub-rubrics-container">
                    <!-- Existing Sub-Rubrics from Edit Mode -->
                    <div th:each="subRubric, iterStat : *{subRubrics}" class="sub-rubric-card">
                        <input type="hidden" th:field="*{subRubrics[__${iterStat.index}__].id}" />
                        
                        <div class="form-group">
                            <label>Sub-Rubric Name</label>
                            <input type="text" th:field="*{subRubrics[__${iterStat.index}__].name}" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Description</label>
                            <textarea rows="2" th:field="*{subRubrics[__${iterStat.index}__].description}"></textarea>
                        </div>
                        
                        <h4 style="margin-top: 20px; color: #3498db;">Rating Levels (0-4)</h4>
                        <p class="info-text">
                            Note: Ratings don't have individual marks. Student marks = (average of selected rating levels / 4) × sub-rubric marks.
                        </p>
                        
                        <div class="rating-grid">
                            <div th:each="rating, ratingStat : ${subRubric.ratings}" class="rating-item">
                                <input type="hidden" th:field="*{subRubrics[__${iterStat.index}__].ratings[__${ratingStat.index}__].id}" />
                                <input type="hidden" th:field="*{subRubrics[__${iterStat.index}__].ratings[__${ratingStat.index}__].level}" />
                                
                                <span class="rating-label" th:text="${rating.levelLabel}">Level</span>
                                
                                <div class="form-group">
                                    <label>Description (Optional)</label>
                                    <textarea rows="2" th:field="*{subRubrics[__${iterStat.index}__].ratings[__${ratingStat.index}__].description}" placeholder="Describe what this level means for this sub-rubric"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="button-container">
                    <button type="button" id="addSubRubricBtn" class="btn btn-add">Add Sub-Rubric</button>
                    <button type="button" id="removeLastSubRubricBtn" class="btn btn-danger">Remove Last Sub-Rubric</button>
                    <button type="submit" class="btn btn-primary">Save Rubric</button>
                </div>
            </form>
        </div>
    </div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        const addBtn = document.getElementById('addSubRubricBtn');
        const removeBtn = document.getElementById('removeLastSubRubricBtn');
        const container = document.getElementById('sub-rubrics-container');
        
        let subRubricIndex = /*[[${rubric.subRubrics.size()}]]*/ 0;

        const rubricMarksInput = document.getElementById('rubricMarks');
        const cloMarksInput = document.getElementById('cloMarks');
        const messageBox = document.getElementById('submission-message');
        
        const assessmentTypeSelect = document.getElementById('assessmentTypeSelect');
        const assessmentTypesHidden = document.getElementById('assessmentTypesHidden');
        
        // Define the 5-point Likert scale
        const likertScale = [
            { level: 0, label: '0 - Unsatisfactory' },
            { level: 1, label: '1 - Needs Improvement' },
            { level: 2, label: '2 - Satisfactory' },
            { level: 3, label: '3 - Good' },
            { level: 4, label: '4 - Excellent' }
        ];
        
        function updateAssessmentTypes() {
            if(assessmentTypeSelect) {
                assessmentTypesHidden.value = assessmentTypeSelect.value;
            }
        }
        
        if (assessmentTypeSelect) {
            assessmentTypeSelect.addEventListener('change', updateAssessmentTypes);
        }
        updateAssessmentTypes();

        function showMessage(message, type = 'error') {
            messageBox.textContent = message;
            messageBox.style.display = 'block';
            messageBox.style.opacity = 1;
            setTimeout(() => {
                messageBox.style.opacity = 0;
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, 500);
            }, 5000);
        }

        // Sync CLO Marks with Rubric Marks
        rubricMarksInput.addEventListener('input', function() {
            cloMarksInput.value = this.value;
        });

        addBtn.addEventListener('click', function() {
            const card = document.createElement('div');
            card.className = 'sub-rubric-card';
            
            let content = `
                <input type="hidden" name="subRubrics[${subRubricIndex}].id" value="" />
                <div class="form-group">
                    <label>Sub-Rubric Name</label>
                    <input type="text" name="subRubrics[${subRubricIndex}].name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea rows="2" name="subRubrics[${subRubricIndex}].description"></textarea>
                </div>
                <div class="form-group">
                    <label>Marks</label>
                    <input type="number" step="0.01" class="sub-rubric-marks" name="subRubrics[${subRubricIndex}].marks" required>
                </div>
                <h4 style="margin-top: 20px; color: #3498db;">Rating Levels (0-4)</h4>
                <p class="info-text">
                    Note: Ratings don't have individual marks. Student marks = (average of selected rating levels / 4) × sub-rubric marks.
                </p>
                <div class="rating-grid">`;
            
            // Generate exactly 5 ratings with fixed levels
            likertScale.forEach((scale, i) => {
                content += `
                    <div class="rating-item">
                        <input type="hidden" name="subRubrics[${subRubricIndex}].ratings[${i}].id" value="" />
                        <input type="hidden" name="subRubrics[${subRubricIndex}].ratings[${i}].level" value="${scale.level}" />
                        
                        <span class="rating-label">${scale.label}</span>
                        
                        <div class="form-group">
                            <label>Description (Optional)</label>
                            <textarea rows="2" name="subRubrics[${subRubricIndex}].ratings[${i}].description" placeholder="Describe what this level means for this sub-rubric"></textarea>
                        </div>
                    </div>`;
            });
            
            content += '</div>';
            card.innerHTML = content;
            container.appendChild(card);
            subRubricIndex++;
        });

        removeBtn.addEventListener('click', function() {
            const subRubricCards = container.querySelectorAll('.sub-rubric-card');
            if (subRubricCards.length > 0) {
                container.removeChild(subRubricCards[subRubricCards.length - 1]);
                subRubricIndex--;
            } else {
                showMessage('There are no sub-rubrics to remove.');
            }
        });

        // Don't auto-add sub-rubric - it's already initialized from the controller
        // The controller now provides an initial sub-rubric with 5 ratings

        // Form validation on submit
        document.getElementById('rubricForm').addEventListener('submit', function (event) {
            updateAssessmentTypes();
            
            // Validate assessment type selection
            if (!assessmentTypesHidden.value) {
                showMessage('You must select an Applicable Assessment Type.');
                event.preventDefault(); 
                return;
            }
            
            const rubricMarks = parseFloat(document.getElementById('rubricMarks').value) || 0;
            const subRubricCards = container.querySelectorAll('.sub-rubric-card');
            
            if (subRubricCards.length === 0) {
                showMessage('You must add at least one sub-rubric.');
                event.preventDefault(); 
                return;
            }
            
            let totalSubRubricMarks = 0;
            let validationFailed = false;
            
            subRubricCards.forEach((card, index) => {
                const subRubricMarks = parseFloat(card.querySelector('.sub-rubric-marks').value) || 0;
                totalSubRubricMarks += subRubricMarks;
                
                // Validate that exactly 5 ratings exist (no marks validation needed)
                const ratingItems = card.querySelectorAll('.rating-item');
                if (ratingItems.length !== 5) {
                    showMessage(`Error: Each sub-rubric must have exactly 5 rating levels.`);
                    validationFailed = true;
                    return;
                }
            });
            
            if (validationFailed) { 
                event.preventDefault(); 
                return; 
            }
            
            // Validate total marks match
            if (Math.abs(rubricMarks - totalSubRubricMarks) > 0.001) {
                showMessage(`The sum of sub-rubric marks (${totalSubRubricMarks.toFixed(2)}) must equal the total rubric mark (${rubricMarks.toFixed(2)}).`);
                event.preventDefault();
            }
        });
    });
</script>
</body>
</html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Comments</title>
    
    <link rel="stylesheet" th:href="@{/css/admin_sidebar.css}">
    <!-- Removed lecturer sidebar link as this template is now admin-specific -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background-color: #F4F2EE; margin: 0; overflow-x: hidden; }
        .main-content { margin-left: 270px; margin-right: 0; padding: 40px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; width: calc(100% - 270px); max-width: 100%; overflow-x: hidden; box-sizing: border-box; }
        .header-container { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; width: 100%; }
        .header-container img { max-width: 200px; height: auto; }
        .header-container h1 { margin: 0; color: #4A0018; font-size: 2.5rem; font-weight: 700; }
        
        .page-content { padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 1000px; border: 1px solid #E5E7EB; overflow-x: hidden; margin: 0 auto; }
        .page-content table { margin-left: auto; margin-right: auto; }
        .page-content .table-responsive { width: fit-content; max-width: 100%; margin-left: auto; margin-right: auto; overflow-x: auto; }
        .page-content h2 { color: #4A0018; border-bottom: 3px solid #4A0018; padding-bottom: 10px; margin-bottom: 5px; text-align: center; }
        .page-content h5.text-muted { text-align: center; color: #6b7280; margin-top: 0; margin-bottom: 25px; font-weight: normal; }
        
        .btn-secondary { background-color: #3F3F46; color: white; padding: 10px 18px; text-decoration: none; border-radius: 6px; border: none; cursor: pointer; display: inline-block; font-weight: 600; transition: filter 0.2s; }
        .btn-secondary:hover { filter: brightness(110%); }
        
        .student-card { border: 1px solid #E5E7EB; padding: 20px; margin-bottom: 20px; border-radius: 8px; background-color: #fafafa; }
        .student-title { border-bottom: 2px solid #E5E7EB; padding-bottom: 10px; margin-bottom: 15px; color: #4A0018; margin-top: 0; }
        
        .comment-section { margin-bottom: 20px; }
        .comment-section h5 { color: #4A0018; border-bottom: 1px solid #E5E7EB; padding-bottom: 8px; margin-bottom: 15px; }
        
        .evaluator-name { font-weight: 600; color: #3F3F46; margin-top: 15px; display: flex; align-items: center; gap: 8px; }
        .comment-text { margin-left: 24px; margin-top: 8px; padding: 10px 15px; font-style: italic; color: #4b5563; background-color: white; border-left: 3px solid #F8A617; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        
        .row { display: flex; flex-wrap: wrap; gap: 20px; width: 100%; margin: 0; }
        .col-md-6 { flex: 1 1 calc(50% - 10px); min-width: 0; max-width: calc(50% - 10px); padding: 0; box-sizing: border-box; }
        @media (max-width: 768px) { .col-md-6 { flex: 1 1 100%; max-width: 100%; } }
        @media (max-width: 1279px) {
            .main-content { margin-left: 0; width: 100%; padding: 84px 20px 20px; }
            .header-container { flex-direction: column; gap: 10px; text-align: center; }
            .header-container h1 { font-size: 2rem; }
            .page-content { padding: 20px; }
        }

        @media (max-width: 640px) {
            .page-content h2 { font-size: 1.4rem; }
            .student-card { padding: 14px; }
            .comment-text { margin-left: 0; }
            .btn-secondary { width: 100%; text-align: center; }
            .main-content { padding: 80px 12px 16px; }
            .page-content { padding: 14px; }
            .header-container h1 { font-size: 1.5rem; }
            .page-content .table-responsive { width: 100%; }
        }
    </style>
</head>
<body class="admin-page">
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>
    <!-- Removed conditional sidebar loading as this template is now admin-specific -->
    <div class="main-content">
        <div class="header-container">
            <img th:src="@{/images/logoUTM.png}" alt="UTM Logo"/>
            <h1>UTM AAS</h1>
        </div>

        <div class="page-content">
            <h2>Comments for <span style="color: #F8A617;" th:text="${group.groupName}"></span></h2>
            <h5 class="text-muted">Assessment: <span th:text="${assessment.title}"></span></h5>
            
            <div th:if="${#lists.isEmpty(students)}" class="alert alert-warning" style="color: #8a6d3b; background-color: #fcf8e3; border-color: #faebcc; padding: 15px; border-radius: 4px;">
                <p class="mb-0" style="margin: 0;">No students in this group.</p>
            </div>
            
            <div th:each="student : ${students}" class="student-card shadow-sm">
                <h4 class="student-title" th:text="${student.email}">Student Name</h4>
                
                <div class="row">
                    <!-- Group Assessment Comments -->
                    <div class="col-md-6 comment-section">
                        <h5>Group Assessment Received</h5>
                        <div th:if="${#maps.isEmpty(groupCommentsMap[student.id])}">
                            <p class="text-muted small mt-2" style="font-size: 0.875em; color: #777;">No group comments received yet.</p>
                        </div>
                        <div th:each="entry : ${groupCommentsMap[student.id]}">
                            <div class="evaluator-name"><i class="fas fa-user-circle"></i> <span th:text="${entry.key}"></span></div>
                            <div th:each="comment : ${entry.value}" class="comment-text" th:text="'- &quot;' + ${comment} + '&quot;'"></div>
                        </div>
                    </div>
                    
                    <!-- Individual Assessment Comments -->
                    <div class="col-md-6 comment-section">
                        <h5>Individual Assessment Received</h5>
                        <div th:if="${#maps.isEmpty(individualCommentsMap[student.id])}">
                            <p class="text-muted small mt-2" style="font-size: 0.875em; color: #777;">No individual comments received yet.</p>
                        </div>
                        <div th:each="entry : ${individualCommentsMap[student.id]}">
                            <div class="evaluator-name"><i class="fas fa-user-circle"></i> <span th:text="${entry.key}"></span></div>
                            <div th:each="comment : ${entry.value}" class="comment-text" th:text="'- &quot;' + ${comment} + '&quot;'"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <br>
            <a th:href="@{'/' + ${role} + '/comments/view/assessment/' + ${assessment.id} + '/groups'}" class="btn btn-secondary mt-3 mb-5">Back to Groups Selection</a>
        </div>
    </div>
</body>
</html>

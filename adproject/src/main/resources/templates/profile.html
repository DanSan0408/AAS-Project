<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - UTM AAS</title>
    <link rel="stylesheet" th:href="@{/css/critical.css}">
    <link rel="stylesheet" th:href="@{/css/responsive-patterns.css}">
    
    <!-- Load correct sidebar CSS based on role -->
    <link th:if="${role == 'SUPER_ADMIN'}" rel="stylesheet" th:href="@{/css/superadmin_home.css}">
    <link th:if="${role == 'ADMIN'}" rel="stylesheet" th:href="@{/css/admin_sidebar.css}">
    <link th:if="${role == 'LECTURER'}" rel="stylesheet" th:href="@{/css/lecturer_sidebar.css}">
    <link th:if="${role == 'STUDENT'}" rel="stylesheet" th:href="@{/css/student_sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
</head>
<body class="profile-page">

    <div th:if="${role == 'SUPER_ADMIN'}"><div th:replace="~{fragments/superadmin_sidebar :: superadmin_sidebar}"></div></div>
    <div th:if="${role == 'ADMIN'}"><div th:replace="~{fragments/sidebar :: sidebar}"></div></div>
    <div th:if="${role == 'LECTURER'}"><div th:replace="~{fragments/lecturer_sidebar :: sidebar}"></div></div>
    <div th:if="${role == 'STUDENT'}"><div th:replace="~{fragments/student_sidebar :: sidebar}"></div></div>

    <div class="main-content">
        <div class="header">
            <div class="header-container">
                <img th:src="@{/images/utmlogo.png}" alt="UTM Logo"/>
                <h1>UTM AAS</h1>
            </div>
        </div>
        <div class="profile-container">
            <div class="profile-header">
                <h2>My Profile</h2>
            </div>
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <form th:action="@{/profile/update}" method="post">
                <div class="form-group"><label>Email Address</label><input type="email" name="email" th:value="${email}" disabled><small class="field-help">Email address cannot be changed.</small></div>
                <div class="form-group"><label>Username / Name</label><input type="text" name="username" th:value="${username}" required minlength="2" maxlength="50"></div>
                <div class="form-group"><label>Account Role</label><input type="text" th:value="${role}" disabled></div>
                <button type="submit" class="btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Required to un-hide the page when critical.css is used -->
    <script th:src="@{/js/loading.js}" th:attr="nonce=${cspNonce}"></script>
</body>
</html>

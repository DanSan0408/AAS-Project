<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Manage Assessments & Rubrics</title>
    <link rel="stylesheet" th:href="@{/css/admin_sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/rubric.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="rubric-page">
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        
        <div class="header-container">
            <img th:src="@{/images/logoUTM.png}" alt="UTM Logo"/>
            <h1>UTM AAS</h1>
        </div>
        
        <div class="message-container">
            <div th:if="${successMessage}" class="alert alert-success">
                <i class="fas fa-check-circle"></i> <span th:text="${successMessage}">Success!</span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}">Error!</span>
            </div>
        </div>

        <div class="card creation-card">
            <div class="card-header">
                <h2>
                    <i class="fas fa-pen-nib"></i>
                    <span th:if="${newAssessment.id == null}">Create New Assessment</span>
                    <span th:if="${newAssessment.id != null}">Edit Assessment</span>
                </h2>
            </div>
            
            <form id="assessment-form" th:action="@{/rubrics/assessment/save}" th:object="${newAssessment}" method="post">
                <input type="hidden" th:field="*{id}" />
                <input type="hidden" name="duplicateConfirmed" id="duplicateConfirmed" value="false" /> 
                
                <div class="input-group">
                    <input type="text" th:field="*{title}" placeholder="Enter assessment title (e.g., Final Year Project)" required>
                    
                    <button type="submit" id="saveButton" class="btn btn-primary">
                        <span th:if="${newAssessment.id == null}"><i class="fas fa-plus"></i> Save Assessment</span>
                        <span th:if="${newAssessment.id != null}"><i class="fas fa-save"></i> Update Assessment</span>
                    </button>
                    
                    <a th:if="${newAssessment.id != null}" th:href="@{/rubrics/manage}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </div>
            </form>
        </div>

        <div class="card list-card">
            <div class="card-header">
                <h2><i class="fas fa-list"></i> Existing Assessments</h2>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 10%;">ID</th>
                            <th style="width: 40%;">Title</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(assessments)}">
                            <td colspan="3" style="text-align: center; padding: 20px; font-style: italic;">No assessments created yet.</td>
                        </tr>
                        <tr th:each="assessment : ${assessments}">
                            <td th:text="${assessment.id}">1</td>
                            <td th:text="${assessment.title}" style="font-weight: 600;">Final Year Project</td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="@{/rubrics/view/{id}(id=${assessment.id})}" 
                                       class="btn btn-sm btn-view"
                                       title="View Rubrics">
                                        <i class="fas fa-eye"></i> Rubrics
                                    </a>
                                    
                                    <a th:href="@{/rubrics/add/{id}(id=${assessment.id})}" 
                                       class="btn btn-sm btn-add-sub"
                                       title="Add Rubric">Add Rubric
                                        <i class="fas fa-plus"></i>
                                    </a>

                                    <div class="dropdown">
                                        <button type="button"
                                                class="btn btn-sm btn-configure dropdown-toggle"
                                                th:onclick="'toggleDropdown(' + ${assessment.id} + ')'"
                                                title="Configure">
                                            <i class="fas fa-cog"></i> Comments
                                        </button>
                                        <div th:id="'dropdown-' + ${assessment.id}" class="dropdown-menu">
                                            <a th:href="@{/admin/comment-config/{id}/group(id=${assessment.id})}" class="dropdown-item">
                                                <i class="fas fa-users"></i> Group Comments
                                            </a>
                                            <div class="dropdown-divider"></div>
                                            <a th:href="@{/admin/comment-config/{id}/individual(id=${assessment.id})}" class="dropdown-item">
                                                <i class="fas fa-user"></i> Individual Comments
                                            </a>
                                        </div>
                                    </div>
                                    
                                    <a th:href="@{/admin/lecturer-assignments/{id}(id=${assessment.id})}" 
                                       class="btn btn-sm btn-lecturer"
                                       title="Assign Lecturers">
                                        <i class="fas fa-user-tie"></i>
                                    </a>

                                    <a th:href="@{/admin/assessment/assign/{id}(id=${assessment.id})}" 
                                       class="btn btn-sm btn-assign"
                                       title="Assign Dates">
                                        <i class="fas fa-calendar-alt"></i>
                                    </a>
                                    
                                    <a th:href="@{/rubrics/assessment/edit/{id}(id=${assessment.id})}" 
                                       class="btn btn-sm btn-edit"
                                       title="Edit Title">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    
                                    <form th:action="@{/rubrics/assessment/delete/{id}(id=${assessment.id})}" 
                                          method="post" 
                                          onsubmit="return confirm('Are you sure you want to delete this assessment and all its rubrics?');"
                                          style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-delete" title="Delete">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
<script th:inline="javascript">
    // Dropdown Toggle Function
    function toggleDropdown(assessmentId) {
        const dropdownId = 'dropdown-' + assessmentId;
        const dropdown = document.getElementById(dropdownId);
        
        // Close all other dropdowns first
        document.querySelectorAll('.dropdown-menu').forEach(d => {
            if (d.id !== dropdownId) {
                d.classList.remove('show');
            }
        });
        
        // Toggle this dropdown
        if(dropdown) {
            dropdown.classList.toggle('show');
        }
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(event) {
        if (!event.target.closest('.dropdown')) {
            document.querySelectorAll('.dropdown-menu').forEach(d => {
                d.classList.remove('show');
            });
        }
    });

    // Duplicate detection logic (UNCHANGED)
    document.addEventListener('DOMContentLoaded', function() {
        const assessmentForm = document.getElementById('assessment-form');
        const saveButton = document.getElementById('saveButton');
        const confirmedInput = document.getElementById('duplicateConfirmed');

        const duplicateFound = /*[[${duplicateFound}]]*/ false;

        if (duplicateFound) {
            const assessmentObject = /*[[${newAssessment}]]*/ null;
            let currentTitle = 'Untitled Assessment';
            
            if (assessmentObject && assessmentObject.title) {
                currentTitle = assessmentObject.title;
            }

            saveButton.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Confirm Duplicate';
            saveButton.classList.remove('btn-primary');
            saveButton.classList.add('btn-confirm-save', 'glow-effect');

            const handleSubmit = function(event) {
                event.preventDefault(); 
                
                const confirmed = confirm("WARNING: An Assessment with the title '" 
                    + currentTitle 
                    + "' already exists. Do you really want to save this duplicate?");
                
                if (confirmed) {
                    assessmentForm.removeEventListener('submit', handleSubmit); 
                    confirmedInput.value = 'true';
                    assessmentForm.submit(); 
                }
            };
            
            assessmentForm.addEventListener('submit', handleSubmit);
        }
    });
</script>
</body>
</html>

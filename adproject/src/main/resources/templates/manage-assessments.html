<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Manage Assessments & Rubrics</title>
    <link rel="stylesheet" th:href="@{/css/rubric.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    /* Styles for flash messages (UNCHANGED) */
    .flash-message {
        padding: 10px 15px;
        margin-bottom: 20px;
        border-radius: 5px;
        font-weight: bold;
    }
    .alert-success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }
    /* Note: If .alert-warning is applied to the button, this color might conflict */
    .alert-error, .alert-warning {
        background-color: #f8d7da;
        color: #721c24; 
        border: 1px solid #f5c6cb;
    }
    
    /* NEW: Explicit Styles for the Confirmation Button */
    /* This overrides the default .btn-warning and any conflicting alert styles */
    .btn-confirm-save {
        /* Set background to standard Bootstrap Yellow */
        background-color: #ffc107 !important; 
        /* Set text color to a highly visible dark color (e.g., black or dark grey) */
        color: #212529 !important; 
        /* Ensure border is visible */
        border-color: #ffc107 !important; 
    }

    /* Optional visual cue for the 'Confirm' button (UNCHANGED) */
    .glow-effect {
        box-shadow: 0 0 10px rgba(255, 193, 7, 0.7);
        animation: pulse 1.5s infinite alternate;
    }
    @keyframes pulse {
        0% { box-shadow: 0 0 10px rgba(255, 193, 7, 0.5); }
        100% { box-shadow: 0 0 20px rgba(255, 193, 7, 1); }
    }
    
    /* ⭐ NEW: Enhanced Action Buttons Layout */
    .action-buttons {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
    }
    
    .action-buttons form {
        margin: 0;
    }
    
    /* Button color coding for better visibility */
    .btn-configure {
        background-color: #9b59b6 !important;
        color: white !important;
    }
    
    .btn-assign {
        background-color: #f7941d !important;
        color: white !important;
    }
    
    .btn-configure:hover {
        background-color: #8e44ad !important;
    }
    
    .btn-assign:hover {
        background-color: #e67e22 !important;
    }
</style>
</head>
<body>
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div class="header">
            <div class="header-container">
                <img th:src="@{/images/utmlogo.png}" alt="UTM Logo"/>
                <h1>UTM CAS</h1>
            </div>
        </div>
        
        <div class="main-content">
            
            <div th:if="${successMessage}" class="flash-message alert-success" th:text="${successMessage}">Success!</div>
            <div th:if="${errorMessage}" class="flash-message alert-error" th:text="${errorMessage}">Error!</div>
            
            <div class="card">
                <h1>
                    <span th:if="${newAssessment.id == null}">Create New Assessment</span>
                    <span th:if="${newAssessment.id != null}">Edit Assessment</span>
                </h1>
                
                <form id="assessment-form" th:action="@{/rubrics/assessment/save}" th:object="${newAssessment}" method="post">
                    <input type="hidden" th:field="*{id}" />
                    
                    <input type="hidden" name="duplicateConfirmed" id="duplicateConfirmed" value="false" /> 
                    
                    <input type="text" th:field="*{title}" placeholder="Enter assessment title" required>
                    
                    <button type="submit" id="saveButton" class="btn btn-add">
                        <span th:if="${newAssessment.id == null}">Save Assessment</span>
                        <span th:if="${newAssessment.id != null}">Update Assessment</span>
                    </button>
                    
                    <a th:if="${newAssessment.id != null}" th:href="@{/rubrics/manage}" class="btn btn-secondary" style="margin-left: 10px;">Cancel Edit</a>
                </form>
            </div>

            <div class="card">
                <h1>Existing Assessments</h1>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th style="width: 400px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="assessment : ${assessments}">
                            <td th:text="${assessment.id}">1</td>
                            <td th:text="${assessment.title}">Final Year Project</td>
                            <td>
                                <!-- ✅ MODIFIED: Enhanced Action Buttons with Configure Comments and Assign Assessment -->
                                <div class="action-buttons">
                                    <!-- View Rubrics Button -->
                                    <a th:href="@{/rubrics/view/{id}(id=${assessment.id})}" 
                                       class="btn btn-view"
                                       title="View all rubrics for this assessment">
                                        <i class="fas fa-eye"></i> View Rubrics
                                    </a>
                                    
                                    <!-- ⭐ NEW: Configure Comments Button -->
                                    <a th:href="@{/admin/comment-config/{id}(id=${assessment.id})}" 
                                       class="btn btn-configure"
                                       title="Configure comment requirements">
                                        <i class="fas fa-comments"></i> Configure Comments
                                    </a>
                                    
                                    <!-- ⭐ NEW: Assign Assessment Button -->
                                    <a th:href="@{/admin/assessment/assign/{id}(id=${assessment.id})}" 
                                       class="btn btn-assign"
                                       title="Assign assessment and set deadlines">
                                        <i class="fas fa-calendar-plus"></i> Assign Assessment
                                    </a>
                                    
                                    <!-- Add Rubric Button -->
                                    <a th:href="@{/rubrics/add/{id}(id=${assessment.id})}" 
                                       class="btn btn-add"
                                       title="Add a new rubric">
                                        <i class="fas fa-plus"></i> Add Rubric
                                    </a>
                                    
                                    <!-- Edit Button -->
                                    <a th:href="@{/rubrics/assessment/edit/{id}(id=${assessment.id})}" 
                                       class="btn btn-edit"
                                       title="Edit assessment title">
                                        <i class="fas fa-edit"></i> Edit
                                    </a>
                                    
                                    <!-- Delete Button -->
                                    <form th:action="@{/rubrics/assessment/delete/{id}(id=${assessment.id})}" 
                                          method="post" 
                                          onsubmit="return confirm('Are you sure you want to delete this assessment and all its rubrics?');">
                                        <button type="submit" 
                                                class="btn btn-delete"
                                                title="Delete assessment and all rubrics">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const assessmentForm = document.getElementById('assessment-form');
        const saveButton = document.getElementById('saveButton');
        const confirmedInput = document.getElementById('duplicateConfirmed');

        // FIX: Add Console Log to confirm if the variable is being passed
        const duplicateFound = /*[[${duplicateFound}]]*/ false;
        console.log("Duplicate Check Status (Thymeleaf Value):", duplicateFound);

        if (duplicateFound) {
            
            // FIX: Safely retrieve the title from the newAssessment object
            const assessmentObject = /*[[${newAssessment}]]*/ null;
            let currentTitle = 'Untitled Assessment';
            
            if (assessmentObject && assessmentObject.title) {
                currentTitle = assessmentObject.title;
            } else {
                // This will log if the newAssessment object failed to transfer
                console.error("Flash attribute 'newAssessment' or its title property is missing.");
            }

            console.log("Title for Alert:", currentTitle);


            saveButton.textContent = 'Confirm Duplicate Save';
            saveButton.classList.remove('btn-add');
            saveButton.classList.remove('btn-primary');
            // --- CHANGE MADE HERE ---
            saveButton.classList.remove('btn-warning'); // Remove the generic warning class
            saveButton.classList.add('btn-confirm-save', 'glow-effect'); // Add the new, visible class

            // --- Define the function reference for easy removal ---
            const handleSubmit = function(event) {
                // Prevent the initial submission
                event.preventDefault(); 
                
                const confirmed = confirm("WARNING: An Assessment with the title '" 
                    + currentTitle 
                    + "' already exists. Do you really want to save this duplicate?");
                
                if (confirmed) {
                    // 1. Remove the listener to prevent infinite loop
                    assessmentForm.removeEventListener('submit', handleSubmit); 
                    
                    // 2. Set the hidden field to 'true'
                    confirmedInput.value = 'true';
                    
                    // 3. Submit the form naturally
                    assessmentForm.submit(); 
                } else {
                    alert("Duplicate save cancelled. Please change the title if you don't want a duplicate.");
                }
            };
            
            // Attach the new submission handler
            assessmentForm.addEventListener('submit', handleSubmit);
        }
    });
</script>
</body>
</html>

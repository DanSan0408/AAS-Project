spring.application.name=adproject

# This tells Spring Boot which profile to use by default
spring.profiles.active=dev

# JPA settings
# Disable auto DDL so Hibernate does not fail startup on legacy/broken FK metadata.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Spring Mail Properties (Example using Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ihsan.rubix@gmail.com
spring.mail.password=oxzh ucws hijw sbet
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Email SMTP Connection Pooling / Keep-Alive Configuration
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Keep the connection alive to avoid 20-second TLS handshakes per email
spring.mail.properties.mail.smtp.quitwait=false


 logging.file.path=logs/ 
 logging.file.name=logs/application.log 

spring.thymeleaf.cache=false
logging.level.org.thymeleaf=DEBUG
server.error.include-message=always
server.error.include-stacktrace=always

spring.devtools.restart.enabled=false

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.authentication.rememberme=TRACE

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# --- Alerting Configuration ---
# Enable or disable the alerting system entirely
adproject.alerts.enabled=true
# The email address to send alerts to
adproject.alerts.recipient-email=san.dan0408@gmail.com
# The threshold for 5xx errors per minute to trigger an alert
adproject.alerts.threshold.critical-errors=10
